<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — إتمام الطلب</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar-brand">Antika Gallery</a>
    <ul class="navbar-nav" id="nav-menu">
      <li><a href="/" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
      <li><a href="/shop.html" data-ar="المتجر" data-en="Shop">المتجر</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      <button class="navbar-icon-btn" onclick="toggleLang()" style="font-size:.75rem;font-weight:700" id="lang-toggle">EN</button>
      <a href="/cart.html" class="navbar-icon-btn"><i class="fas fa-shopping-bag"></i><span class="cart-count" style="display:none">0</span></a>
      <div id="user-area"></div>
    </div>
  </nav>

  <div class="container page-enter" style="padding-top:2rem;padding-bottom:4rem">
    <div style="margin-bottom:1.75rem">
      <h1 style="font-family:var(--font-display);font-size:1.9rem;font-style:italic;margin-bottom:.25rem" data-ar="إتمام الطلب" data-en="Checkout">إتمام الطلب</h1>
      <p style="color:var(--text-muted);font-size:.9rem" data-ar="تفاصيل التوصيل والدفع" data-en="Delivery & Payment details">تفاصيل التوصيل والدفع</p>
    </div>

    <div id="checkout-content">
      <div style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>

  <footer class="footer-simple">
    <div class="container">
      <p>© 2026 Antika Gallery</p>
      <p class="footer-dev">Developed by <a href="https://www.facebook.com/profile.php?id=61552026802548&locale=ar_AR" target="_blank" rel="noopener" style="color:var(--gold);font-weight:600">Moaz</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    const l = getLang();
    let currentUser   = null;
    let couponData    = null;
    let proofFile     = null;
    let proofUrl      = null;
    let paymentMethod = 'cash';
    let waNum         = null;

    function applyLang() {
      document.querySelectorAll('[data-ar]').forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
        el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en;
      });
      document.getElementById('lang-toggle').textContent = l === 'ar' ? 'EN' : 'ع';
    }
    function toggleLang()  { setLang(l === 'ar' ? 'en' : 'ar'); }
    function toggleTheme() {
      const t = getTheme() === 'light' ? 'dark' : 'light';
      setTheme(t);
      document.getElementById('theme-toggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    async function init() {
      checkMaintenance();
      applyLang();
      updateCartCount();
      document.getElementById('theme-toggle').innerHTML = getTheme() === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20));

      const cart = getCart();
      if (!cart.length) { renderEmptyCart(); return; }

      const ordersEnabled = await getSetting('orders_enabled');
      if (ordersEnabled === 'false') {
        document.getElementById('checkout-content').innerHTML = `
          <div class="empty-cart-msg">
            <i class="fas fa-store-slash"></i>
            <h3 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:.75rem">
              ${l === 'ar' ? 'الطلبات متوقفة مؤقتاً' : 'Orders temporarily paused'}
            </h3>
            <p style="color:var(--text-muted);margin-bottom:1.5rem">
              ${l === 'ar' ? 'عذراً، الطلبات متوقفة حالياً. تواصل معنا على الواتساب.' : 'Sorry, orders are paused. Contact us on WhatsApp.'}
            </p>
            <a href="/shop.html" class="btn btn-outline">${l === 'ar' ? 'متابعة التسوق' : 'Continue Shopping'}</a>
          </div>`;
        return;
      }

      currentUser = await getCurrentUser();
      if (!currentUser) {
        window.location.href = '/auth.html?redirect=/checkout.html';
        return;
      }

      const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
      waNum = await getSetting('whatsapp_number');

      renderCheckout(cart, profile);
    }

    function renderEmptyCart() {
      document.getElementById('checkout-content').innerHTML = `
        <div class="empty-cart-msg">
          <i class="fas fa-shopping-bag"></i>
          <h3 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:.75rem">
            ${l === 'ar' ? 'السلة فاضية' : 'Your cart is empty'}
          </h3>
          <p style="color:var(--text-muted);margin-bottom:1.5rem">
            ${l === 'ar' ? 'أضيفي منتجات للسلة الأول' : 'Add products to cart first'}
          </p>
          <a href="/shop.html" class="btn btn-primary btn-lg">${l === 'ar' ? 'تسوقي الآن' : 'Shop Now'}</a>
        </div>`;
    }

    function renderCheckout(cart, profile) {
      const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const placeholder = 'https://res.cloudinary.com/df3ffyrsg/image/upload/q_auto,f_auto,w_52/v1/antika/placeholder';

      document.getElementById('checkout-content').innerHTML = `
        <div class="checkout-layout">
          <div>
            <div class="section-card">
              <h3><i class="fas fa-map-marker-alt"></i> ${l === 'ar' ? 'بيانات التوصيل' : 'Delivery Details'}</h3>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                  <label class="form-label">${l === 'ar' ? 'الاسم الكامل *' : 'Full Name *'}</label>
                  <input type="text" class="form-control" id="c-name" value="${escapeHtml(profile?.full_name || '')}" maxlength="100">
                </div>
                <div class="form-group">
                  <label class="form-label">${l === 'ar' ? 'رقم التليفون *' : 'Phone *'}</label>
                  <input type="tel" class="form-control" id="c-phone" dir="ltr" value="${escapeHtml(profile?.phone || '')}" maxlength="15" inputmode="numeric">
                </div>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label">${l === 'ar' ? 'العنوان كامل *' : 'Full Address *'}</label>
                <input type="text" class="form-control" id="c-address" value="${escapeHtml(profile?.address || '')}" maxlength="300" placeholder="${l === 'ar' ? 'المحافظة، المدينة، الشارع...' : 'Governorate, city, street...'}">
              </div>
            </div>

            <div class="section-card">
              <h3><i class="fas fa-sticky-note"></i> ${l === 'ar' ? 'ملاحظات (اختياري)' : 'Notes (optional)'}</h3>
              <textarea class="form-control" id="c-notes" rows="2"
                placeholder="${l === 'ar' ? 'أي تعليمات خاصة للتوصيل...' : 'Any special delivery instructions...'}"></textarea>
            </div>

            <div class="section-card">
              <h3><i class="fas fa-credit-card"></i> ${l === 'ar' ? 'طريقة الدفع' : 'Payment Method'}</h3>
              <div class="payment-options">
                <div class="payment-opt selected" id="opt-cash" onclick="selectPayment('cash')">
                  <i class="fas fa-money-bill-wave"></i>
                  <div>
                    <div class="payment-opt-label">${l === 'ar' ? 'كاش عند الاستلام' : 'Cash on Delivery'}</div>
                    <div class="payment-opt-desc">${l === 'ar' ? 'ادفع لما الطلب يوصلك' : 'Pay when you receive'}</div>
                  </div>
                </div>
                <div class="payment-opt" id="opt-wallet" onclick="selectPayment('wallet')">
                  <i class="fas fa-mobile-alt"></i>
                  <div>
                    <div class="payment-opt-label">${l === 'ar' ? 'محفظة إلكترونية' : 'E-Wallet'}</div>
                    <div class="payment-opt-desc">${l === 'ar' ? 'فودافون كاش / انستاباي' : 'Vodafone Cash / InstaPay'}</div>
                  </div>
                </div>
              </div>

              <div class="wallet-details" id="wallet-details">
                <div style="font-size:.85rem;color:var(--text-secondary);margin-bottom:.75rem">
                  ${l === 'ar' ? 'حوّل المبلغ على الرقم ده ثم ارفع صورة الإيصال:' : 'Transfer the amount to this number then upload the receipt:'}
                </div>
                ${waNum ? `
                  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem">
                    <i class="fas fa-phone" style="color:var(--gold)"></i>
                    <div class="wallet-number">${escapeHtml(waNum)}</div>
                    <button onclick="copyNumber()" class="btn btn-ghost btn-sm"><i class="fas fa-copy"></i></button>
                  </div>` : ''}
                <div class="upload-proof" onclick="document.getElementById('proof-input').click()">
                  <i class="fas fa-cloud-upload-alt" style="font-size:1.5rem;display:block;margin-bottom:.5rem"></i>
                  <div style="font-size:.875rem;font-weight:600">${l === 'ar' ? 'ارفع صورة الإيصال *' : 'Upload Receipt *'}</div>
                  <div style="font-size:.75rem;margin-top:.2rem">${l === 'ar' ? 'JPG, PNG — حتى 5MB' : 'JPG, PNG — up to 5MB'}</div>
                </div>
                <input type="file" id="proof-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleProof(this)">
                <div class="proof-preview" id="proof-preview">
                  <img id="proof-img" src="" alt="إيصال الدفع">
                </div>
                <div id="proof-status" style="font-size:.8rem;color:var(--text-muted);margin-top:.4rem"></div>
              </div>
            </div>
          </div>

          <div>
            <div class="section-card" style="position:sticky;top:90px">
              <h3><i class="fas fa-receipt"></i> ${l === 'ar' ? 'ملخص الطلب' : 'Order Summary'}</h3>

              <div style="margin-bottom:1rem">
                ${cart.map(item => `
                  <div class="order-item">
                    <img src="${escapeHtml(item.image ? cardImage(item.image) : placeholder)}"
                      alt="" onerror="this.src='${placeholder}'">
                    <div style="flex:1">
                      <div style="font-size:.875rem;font-weight:600;line-height:1.3">${escapeHtml(item.name)}</div>
                      <div style="font-size:.78rem;color:var(--text-muted)">×${item.quantity}</div>
                    </div>
                    <div style="font-weight:700;color:var(--gold);font-size:.9rem;white-space:nowrap">
                      ${formatPrice(item.price * item.quantity)}
                    </div>
                  </div>`).join('')}
              </div>

              <div style="margin-bottom:1rem">
                <label class="form-label" style="font-size:.8rem">${l === 'ar' ? 'كود الخصم' : 'Discount Code'}</label>
                <div class="coupon-row">
                  <input type="text" class="form-control" id="coupon-input" dir="ltr"
                    style="text-transform:uppercase;font-family:monospace"
                    placeholder="${l === 'ar' ? 'أدخل الكود...' : 'Enter code...'}"
                    maxlength="30"
                    onkeydown="if(event.key==='Enter')applyCoupon()">
                  <button class="btn btn-outline btn-sm" onclick="applyCoupon()" id="coupon-btn">
                    ${l === 'ar' ? 'تطبيق' : 'Apply'}
                  </button>
                </div>
                <div class="coupon-msg" id="coupon-msg"></div>
              </div>

              <div class="summary-divider"></div>
              <div class="summary-row">
                <span style="color:var(--text-secondary)">${l === 'ar' ? 'الإجمالي الفرعي' : 'Subtotal'}</span>
                <span id="sum-subtotal">${formatPrice(subtotal)}</span>
              </div>
              <div class="summary-row" id="sum-discount-row" style="display:none">
                <span style="color:#16a34a">${l === 'ar' ? 'خصم الكوبون' : 'Coupon Discount'}</span>
                <span style="color:#16a34a" id="sum-discount">−${formatPrice(0)}</span>
              </div>
              <div class="summary-row">
                <span style="color:var(--text-secondary)">${l === 'ar' ? 'التوصيل' : 'Delivery'}</span>
                <span style="color:#16a34a;font-weight:600">${l === 'ar' ? 'عند الاستلام' : 'On delivery'}</span>
              </div>
              <div class="summary-divider"></div>
              <div class="summary-row summary-total">
                <span>${l === 'ar' ? 'الإجمالي' : 'Total'}</span>
                <span id="sum-total">${formatPrice(subtotal)}</span>
              </div>

              <button class="btn btn-primary btn-block btn-lg" style="margin-top:1.25rem" onclick="placeOrder()" id="place-btn">
                <i class="fas fa-check-circle"></i>
                ${l === 'ar' ? 'تأكيد الطلب' : 'Place Order'}
              </button>

              <div id="order-error" class="form-error" style="margin-top:.75rem;text-align:center;display:none"></div>

              <div style="text-align:center;margin-top:1rem">
                <a href="/cart.html" style="font-size:.82rem;color:var(--text-muted)">
                  <i class="fas fa-arrow-right"></i> ${l === 'ar' ? 'رجوع للسلة' : 'Back to Cart'}
                </a>
              </div>
            </div>
          </div>
        </div>`;

      initUserArea(profile);
    }

    function selectPayment(method) {
      paymentMethod = method;
      document.getElementById('opt-cash').classList.toggle('selected',   method === 'cash');
      document.getElementById('opt-wallet').classList.toggle('selected', method === 'wallet');
      const wd = document.getElementById('wallet-details');
      if (wd) wd.classList.toggle('show', method === 'wallet');
    }

    function copyNumber() {
      if (waNum) {
        navigator.clipboard.writeText(waNum).then(() => showToast(l === 'ar' ? 'تم نسخ الرقم' : 'Number copied'));
      }
    }

    async function handleProof(input) {
      const file = input.files[0];
      if (!file) return;
      const allowed = ['image/jpeg', 'image/png', 'image/webp'];
      if (!allowed.includes(file.type)) {
        showToast(l === 'ar' ? 'اختر صورة JPG أو PNG' : 'Choose JPG or PNG', 'error');
        input.value = ''; return;
      }
      if (file.size > 5 * 1024 * 1024) {
        showToast(l === 'ar' ? 'الصورة أكبر من 5MB' : 'Image exceeds 5MB', 'error');
        input.value = ''; return;
      }
      proofFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('proof-img').src = e.target.result;
        document.getElementById('proof-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
      document.getElementById('proof-status').textContent = l === 'ar' ? 'هيترفع الإيصال عند تأكيد الطلب' : 'Receipt will upload on order confirmation';
    }

    async function applyCoupon() {
      const code    = document.getElementById('coupon-input').value.trim().toUpperCase();
      const msgEl   = document.getElementById('coupon-msg');
      const btn     = document.getElementById('coupon-btn');
      if (!code) return;

      btn.disabled  = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      msgEl.textContent = '';

      const cart     = getCart();
      const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const result   = await validateCoupon(code, subtotal);

      btn.disabled  = false;
      btn.innerHTML = l === 'ar' ? 'تطبيق' : 'Apply';

      if (!result.valid) {
        couponData = null;
        msgEl.style.color   = '#dc2626';
        msgEl.textContent   = result.msg;
        document.getElementById('sum-discount-row').style.display = 'none';
        document.getElementById('sum-total').textContent = formatPrice(subtotal);
        return;
      }

      couponData = result;
      msgEl.style.color = '#16a34a';
      msgEl.textContent = result.msg;

      const discounted = subtotal - result.discount;
      document.getElementById('sum-discount-row').style.display = 'flex';
      document.getElementById('sum-discount').textContent  = `−${formatPrice(result.discount)}`;
      document.getElementById('sum-total').textContent     = formatPrice(discounted);
    }

    async function placeOrder() {
      const name    = document.getElementById('c-name')?.value.trim();
      const phone   = document.getElementById('c-phone')?.value.trim();
      const address = document.getElementById('c-address')?.value.trim();
      const notes   = document.getElementById('c-notes')?.value.trim();
      const errEl   = document.getElementById('order-error');
      const btn     = document.getElementById('place-btn');

      errEl.style.display = 'none';

      if (!name) {
        errEl.textContent = l === 'ar' ? 'اكتب اسمك الكامل' : 'Enter your full name';
        errEl.style.display = 'block'; return;
      }
      if (!phone || !/^[\+]?[\d\s\-]{7,15}$/.test(phone)) {
        errEl.textContent = l === 'ar' ? 'اكتب رقم تليفون صحيح' : 'Enter a valid phone number';
        errEl.style.display = 'block'; return;
      }
      if (!address) {
        errEl.textContent = l === 'ar' ? 'اكتب عنوان التوصيل' : 'Enter delivery address';
        errEl.style.display = 'block'; return;
      }
      if (paymentMethod === 'wallet' && !proofFile && !proofUrl) {
        errEl.textContent = l === 'ar' ? 'ارفع صورة إيصال الدفع' : 'Upload payment receipt';
        errEl.style.display = 'block'; return;
      }

      // منع double submit
      if (btn.disabled) return;
      btn.disabled  = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${l === 'ar' ? 'جاري التأكيد...' : 'Processing...'}`;

      const cart     = getCart();
      const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const discount = couponData?.discount || 0;
      const total    = Math.max(0, subtotal - discount);

      try {
        // ═══════════════════════════════════════════════════════
        // FIX: تحقق من توفر المخزون الفعلي قبل إتمام الطلب
        // قبل كده كان النظام بيقبل أي طلب حتى لو الكمية المطلوبة
        // أكبر من المتاح فعلياً — العميل كان بيدفع/يطلب حاجة
        // مش موجودة في المخزون خالص
        // ═══════════════════════════════════════════════════════
        const productIds = cart.map(item => item.id);
        const { data: currentProducts, error: stockCheckErr } = await db
          .from('products')
          .select('id, stock, name, name_ar')
          .in('id', productIds);

        if (stockCheckErr) throw stockCheckErr;

        const stockMap = new Map((currentProducts || []).map(p => [p.id, p]));
        const outOfStockItems = [];

        for (const item of cart) {
          const prod = stockMap.get(item.id);
          if (!prod || prod.stock < item.quantity) {
            const pname = l === 'ar' ? (prod?.name_ar || item.name) : (prod?.name || item.name);
            outOfStockItems.push({ name: pname, available: prod?.stock ?? 0 });
          }
        }

        if (outOfStockItems.length > 0) {
          const namesList = outOfStockItems.map(i =>
            l === 'ar'
              ? `${i.name} (متبقي ${i.available} فقط)`
              : `${i.name} (only ${i.available} left)`
          ).join('، ');
          errEl.textContent = l === 'ar'
            ? `للأسف الكمية المطلوبة مش متوفرة: ${namesList}`
            : `Requested quantity not available: ${namesList}`;
          errEl.style.display = 'block';
          btn.disabled  = false;
          btn.innerHTML = `<i class="fas fa-check-circle"></i> ${l === 'ar' ? 'تأكيد الطلب' : 'Place Order'}`;
          return;
        }

        // رفع الإيصال لو موجود
        if (paymentMethod === 'wallet' && proofFile) {
          proofUrl = await uploadToCloudinary(proofFile, 'payments');
        }

        // تحديث بيانات الـ profile
        await db.from('profiles').update({ full_name: name, phone, address }).eq('id', currentUser.id);

        // ═══════════════════════════════════════════════════════
        // FIX: خصم المخزون أولاً (atomic عن طريق decrement RPC)
        // قبل إنشاء الطلب — ده بيقلل احتمال الـ race condition:
        // لو اتنين عملاء بيحاولوا يشتروا نفس آخر قطعة في نفس اللحظة،
        // الـ decrement (اللي بيستخدم greatest(0, stock-x) في
        // transaction واحدة داخل postgres) هيمنع الكمية توصل لسالب،
        // ولو الستوك خلص فعلاً هيبان في الطلبات اللي بعد كده
        // ═══════════════════════════════════════════════════════
        for (const item of cart) {
          const { error: stockErr } = await db.rpc('decrement', {
            row_id: item.id,
            x: item.quantity
          });
          if (stockErr) {
            // fallback يدوي لو الـ RPC مش موجودة لأي سبب
            const prod = stockMap.get(item.id);
            if (prod) {
              await db.from('products')
                .update({ stock: Math.max(0, prod.stock - item.quantity) })
                .eq('id', item.id);
            }
          }
        }

        // إنشاء الطلب
        const { data: order, error: orderErr } = await db.from('orders').insert({
          user_id:           currentUser.id,
          total,
          status:            'pending',
          payment_method:    paymentMethod,
          payment_proof_url: proofUrl || null,
          notes:             notes || null
        }).select().single();

        // FIX: لو إنشاء الطلب فشل بعد ما المخزون اتخصم، نرجّع المخزون
        // (compensating transaction) — عشان المخزون ميفضلش ناقص
        // من غير ما يكون فيه طلب فعلي وراه
        if (orderErr) {
          for (const item of cart) {
            const prod = stockMap.get(item.id);
            if (prod) {
              await db.from('products')
                .update({ stock: prod.stock })
                .eq('id', item.id);
            }
          }
          throw orderErr;
        }

        // إضافة عناصر الطلب
        const items = cart.map(item => ({
          order_id:      order.id,
          product_id:    item.id,
          quantity:      item.quantity,
          price_at_time: item.price
        }));

        const { error: itemsErr } = await db.from('order_items').insert(items);

        // FIX: لو إضافة عناصر الطلب فشلت، نرجّع المخزون ونحذف الطلب
        // اليتيم (طلب بدون عناصر) — منع بيانات ناقصة في النظام
        if (itemsErr) {
          for (const item of cart) {
            const prod = stockMap.get(item.id);
            if (prod) {
              await db.from('products')
                .update({ stock: prod.stock })
                .eq('id', item.id);
            }
          }
          await db.from('orders').delete().eq('id', order.id);
          throw itemsErr;
        }

        // استخدام الكوبون لو موجود
        if (couponData?.couponId) {
          await useCoupon(couponData.couponId);
        }

        // مسح السلة
        saveCart([]);

        // Redirect لصفحة التأكيد
        window.location.href = `/track.html?success=1&order=${encodeURIComponent(order.id)}`;

      } catch (err) {
        console.error('placeOrder error:', err);
        errEl.textContent   = l === 'ar' ? 'حصل خطأ، حاول تاني' : 'Something went wrong, try again';
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.innerHTML       = `<i class="fas fa-check-circle"></i> ${l === 'ar' ? 'تأكيد الطلب' : 'Place Order'}`;
      }
    }

    function initUserArea(profile) {
      const area = document.getElementById('user-area');
      if (!area) return;
      const initial = (profile?.full_name || 'U')[0];
      area.innerHTML = profile?.avatar_url
        ? `<a href="/profile.html" class="navbar-icon-btn" style="padding:0"><img src="${avatarImage(profile.avatar_url)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)"></a>`
        : `<a href="/profile.html" class="navbar-icon-btn" style="padding:0"><div style="width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700">${escapeHtml(initial)}</div></a>`;
    }

    init();
  </script>
</body>
</html>
