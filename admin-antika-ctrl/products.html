<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Admin — المنتجات</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    .products-grid-admin{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
    .product-admin-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s}
    .product-admin-card:hover{box-shadow:var(--shadow-lg);border-color:var(--gold-light)}
    .product-img-wrap{aspect-ratio:3/4;overflow:hidden;background:var(--bg-secondary);position:relative}
    .product-img-wrap img{width:100%;height:100%;object-fit:cover}
    .product-img-wrap video{width:100%;height:100%;object-fit:cover}
    .product-card-body{padding:1rem}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all .2s;backdrop-filter:blur(4px)}
    .modal-overlay.active{opacity:1;visibility:visible}
    .modal{background:var(--bg-card);border-radius:var(--radius-lg);padding:1.75rem;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);transform:translateY(20px);transition:transform .2s}
    .modal-overlay.active .modal{transform:translateY(0)}
    .upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.75rem}
    .upload-thumb{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;position:relative;background:var(--bg-secondary)}
    .upload-thumb img,.upload-thumb video{width:100%;height:100%;object-fit:cover}
    .upload-thumb button{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center}
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-muted)}
    .upload-area:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}
    .view-toggle{display:flex;gap:.5rem}
    .view-btn{padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;color:var(--text-muted);transition:all .2s}
    .view-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-header">
      <span class="admin-sidebar-logo">Antika Gallery</span>
      <button class="admin-sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="admin-nav">
      <div class="nav-section-label">الرئيسية</div>
      <a href="/admin-antika-ctrl/" class="admin-nav-item"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
      <div class="nav-section-label">المتجر</div>
      <a href="/admin-antika-ctrl/products.html" class="admin-nav-item active"><i class="fas fa-box"></i> المنتجات</a>
      <a href="/admin-antika-ctrl/orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> الطلبات<span class="admin-nav-badge" id="pending-badge" style="display:none">0</span></a>
      <div class="nav-section-label">الإدارة</div>
      <a href="/admin-antika-ctrl/users.html" class="admin-nav-item"><i class="fas fa-users"></i> المستخدمين</a>
      <a href="/admin-antika-ctrl/settings.html" class="admin-nav-item"><i class="fas fa-cog"></i> الإعدادات</a>
      <a href="/" class="admin-nav-item" target="_blank"><i class="fas fa-external-link-alt"></i> عرض الموقع</a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="logout()" class="admin-nav-item" style="color:#dc2626;cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:right">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-right">
        <button class="admin-hamburger" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span class="admin-brand">Antika</span>
        <span class="admin-page-title">/ المنتجات</span>
      </div>
      <div class="admin-topbar-left">
        <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>
    <div class="admin-content">
      <!-- Filters -->
      <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center">
        <div style="position:relative;flex:1;min-width:200px">
          <input type="text" class="form-control" id="search-inp" placeholder="ابحث عن منتج..." oninput="filterProducts()" style="padding-right:2.5rem">
          <i class="fas fa-search" style="position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
        </div>
        <select class="form-control" id="cat-filter" onchange="filterProducts()" style="width:auto">
          <option value="">كل التصنيفات</option>
        </select>
        <select class="form-control" id="status-filter" onchange="filterProducts()" style="width:auto">
          <option value="">الكل</option>
          <option value="published">منشور</option>
          <option value="hidden">مخفي</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="view-grid" onclick="setView('grid')"><i class="fas fa-th"></i></button>
          <button class="view-btn" id="view-list" onclick="setView('list')"><i class="fas fa-list"></i></button>
        </div>
      </div>

      <div id="products-count" style="font-size:.82rem;color:var(--text-muted);margin-bottom:1rem"></div>
      <div id="products-container"><div style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>

    function openSidebar(){document.getElementById('admin-sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('active');}
    function closeSidebar(){document.getElementById('admin-sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('active');}
    function toggleTheme(){const t=getTheme()==='light'?'dark':'light';setTheme(t);document.getElementById('theme-toggle').innerHTML=t==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';}
    async function logout(){await db.auth.signOut();window.location.href='/admin-antika-ctrl/login.html';}
    async function adminAuth(){
      document.body.style.opacity='0';document.body.style.transition='opacity 0.25s';
      let {data:{session}}=await db.auth.getSession();
      if(!session){await new Promise(r=>setTimeout(r,900));const r=await db.auth.getSession();session=r.data.session;}
      if(!session){window.location.href='/admin-antika-ctrl/login.html';return false;}
      const role=session.user.user_metadata?.role;
      if(role!=='admin'&&role!=='moderator'){window.location.href='/admin-antika-ctrl/login.html';return false;}
      document.body.style.opacity='1';
      initTheme();
      document.getElementById('theme-toggle').innerHTML=getTheme()==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
      return true;
    }
    async function loadPendingBadge(){
      const {count}=await db.from('orders').select('*',{count:'exact',head:true}).eq('status','pending');
      const b=document.getElementById('pending-badge');
      if(b&&count>0){b.textContent=count;b.style.display='inline';}
    }

async function loadPendingBadge(){const{count}=await db.from('orders').select('*',{count:'exact',head:true}).eq('status','pending');const b=document.getElementById('pending-badge');if(b&&count>0){b.textContent=count;b.style.display='inline';}}
    async function adminCheck(){
      document.body.style.opacity='0';
      let{data:{session}}=await db.auth.getSession();
      if(!session){await new Promise(r=>setTimeout(r,800));const res=await db.auth.getSession();session=res.data.session;}
      if(!session){window.location.href='/admin-antika-ctrl/';return false;}
      const role=session.user.user_metadata?.role;
      if(role!=='admin'&&role!=='moderator'){window.location.href='/admin-antika-ctrl/';return false;}
      document.body.style.opacity='1';document.body.style.transition='opacity 0.3s';
      
      loadPendingBadge();return session;
    }

    let allProducts=[], categories=[], editingId=null, mediaUrls=[], view='grid';

    function setView(v){
      view=v;
      document.getElementById('view-grid').classList.toggle('active',v==='grid');
      document.getElementById('view-list').classList.toggle('active',v==='list');
      renderProducts(allProducts);
    }

    async function loadCategories(){
      const{data}=await db.from('categories').select('*').order('name');
      categories=data||[];
      const sel1=document.getElementById('cat-filter');
      const sel2=document.getElementById('p-category');
      categories.forEach(c=>{
        sel1.insertAdjacentHTML('beforeend',`<option value="${c.id}">${c.name_ar||c.name}</option>`);
        sel2.insertAdjacentHTML('beforeend',`<option value="${c.id}">${c.name_ar||c.name}</option>`);
      });
    }

    async function loadProducts(){
      const{data}=await db.from('products').select('*,categories(name,name_ar)').order('created_at',{ascending:false});
      allProducts=data||[];
      filterProducts();
    }

    function filterProducts(){
      const q=document.getElementById('search-inp').value.toLowerCase();
      const cat=document.getElementById('cat-filter').value;
      const st=document.getElementById('status-filter').value;
      let filtered=allProducts.filter(p=>{
        const name=((p.name_ar||'')+' '+(p.name||'')).toLowerCase();
        if(q&&!name.includes(q))return false;
        if(cat&&p.category_id!==cat)return false;
        if(st==='published'&&!p.is_published)return false;
        if(st==='hidden'&&p.is_published)return false;
        return true;
      });
      document.getElementById('products-count').textContent=`${filtered.length} منتج`;
      renderProducts(filtered);
    }

    function renderProducts(list){
      const c=document.getElementById('products-container');
      if(!list.length){c.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)"><i class="fas fa-box-open" style="font-size:2.5rem;margin-bottom:1rem;display:block"></i>مفيش منتجات</div>';return;}
      if(view==='grid'){
        c.innerHTML=`<div class="products-grid-admin">${list.map(p=>productCard(p)).join('')}</div>`;
      }else{
        c.innerHTML=`<div class="admin-card"><div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>التصنيف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>${list.map(p=>productRow(p)).join('')}</tbody></table></div></div>`;
      }
    }

    function productCard(p){
      const img=p.images?.[0]||'';
      const isVid=img.includes('.mp4')||img.includes('video');
      const media=img?(isVid?`<video src="${img}" muted style="width:100%;height:100%;object-fit:cover"></video>`:`<img src="${img}" alt="${p.name}" loading="lazy">`): '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)"><i class="fas fa-image" style="font-size:2rem"></i></div>';
      return `<div class="product-admin-card"><div class="product-img-wrap">${media}${!p.is_published?'<div style="position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center"><span style="background:#dc2626;color:#fff;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700">مخفي</span></div>':''}</div><div class="product-card-body"><div style="font-weight:700;font-size:.9rem;margin-bottom:.25rem">${p.name_ar||p.name}</div><div style="color:var(--gold);font-weight:700;margin-bottom:.75rem">${formatPrice(p.price)}</div><div style="display:flex;gap:.5rem"><button class="btn btn-ghost btn-sm" style="flex:1" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-sm" style="flex:1;background:${p.is_published?'rgba(220,38,38,.1)':'rgba(22,163,74,.1)'};color:${p.is_published?'#dc2626':'#16a34a'}" onclick="togglePublish('${p.id}',${p.is_published})"><i class="fas ${p.is_published?'fa-eye-slash':'fa-eye'}"></i></button><button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></div></div></div>`;
    }

    function productRow(p){
      return `<tr><td><div style="font-weight:600">${p.name_ar||p.name}</div></td><td style="color:var(--gold);font-weight:700">${formatPrice(p.price)}</td><td>${p.stock}</td><td><span class="badge badge-gray">${p.categories?.name_ar||p.categories?.name||'—'}</span></td><td>${p.is_published?'<span class="badge badge-success">منشور</span>':'<span class="badge badge-danger">مخفي</span>'}</td><td><div style="display:flex;gap:.4rem"><button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></div></td></tr>`;
    }

    function openModal(id=null){
      editingId=id; mediaUrls=[];
      document.getElementById('modal-title').textContent=id?'تعديل المنتج':'منتج جديد';
      document.getElementById('p-name-ar').value='';document.getElementById('p-name-en').value='';
      document.getElementById('p-price').value='';document.getElementById('p-stock').value='1';
      document.getElementById('p-category').value='';document.getElementById('p-desc-ar').value='';
      document.getElementById('p-desc-en').value='';document.getElementById('media-preview').innerHTML='';
      document.getElementById('p-published').classList.add('on');document.getElementById('modal-error').style.display='none';
      if(id){const p=allProducts.find(x=>x.id===id);if(p)fillModal(p);}
      document.getElementById('modal').classList.add('active');
    }

    function fillModal(p){
      document.getElementById('p-name-ar').value=p.name_ar||'';document.getElementById('p-name-en').value=p.name||'';
      document.getElementById('p-price').value=p.price||'';document.getElementById('p-stock').value=p.stock||0;
      document.getElementById('p-category').value=p.category_id||'';document.getElementById('p-desc-ar').value=p.description_ar||'';
      document.getElementById('p-desc-en').value=p.description||'';
      document.getElementById('p-published').classList.toggle('on',p.is_published);
      mediaUrls=p.images||[];renderMediaPreview();
    }

    function closeModal(){document.getElementById('modal').classList.remove('active');}

    function renderMediaPreview(){
      const grid=document.getElementById('media-preview');
      grid.innerHTML=mediaUrls.map((url,i)=>{
        const isVid=url.includes('video')||url.includes('.mp4');
        return `<div class="upload-thumb">${isVid?`<video src="${url}" muted></video>`:`<img src="${url}">`}<button onclick="removeMedia(${i})">✕</button></div>`;
      }).join('');
    }

    function removeMedia(i){mediaUrls.splice(i,1);renderMediaPreview();}

    async function handleMediaSelect(input){
      const files=[...input.files];
      if(!files.length)return;
      const prog=document.getElementById('upload-progress');
      const bar=document.getElementById('progress-bar');
      const txt=document.getElementById('progress-text');
      prog.style.display='block';
      for(let i=0;i<files.length;i++){
        txt.textContent=`جاري رفع ${i+1} من ${files.length}...`;
        bar.style.width=`${Math.round((i/files.length)*100)}%`;
        try{
          const folder=files[i].type.startsWith('video')?'videos':'products';
          const url=await uploadToCloudinary(files[i],folder);
          mediaUrls.push(url);
        }catch(e){showToast('فشل رفع '+files[i].name,'error');}
      }
      bar.style.width='100%';txt.textContent='تم الرفع!';
      setTimeout(()=>{prog.style.display='none';bar.style.width='0';},1500);
      renderMediaPreview();input.value='';
    }

    async function saveProduct(){
      const nameAr=document.getElementById('p-name-ar').value.trim();
      const nameEn=document.getElementById('p-name-en').value.trim();
      const price=parseFloat(document.getElementById('p-price').value);
      const errEl=document.getElementById('modal-error');
      if(!nameAr&&!nameEn){errEl.textContent='اكتب اسم المنتج';errEl.style.display='block';return;}
      if(!price){errEl.textContent='اكتب سعر المنتج';errEl.style.display='block';return;}
      errEl.style.display='none';
      const btn=document.getElementById('save-btn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
      const data={name:nameEn||nameAr,name_ar:nameAr||null,description:document.getElementById('p-desc-en').value.trim()||null,description_ar:document.getElementById('p-desc-ar').value.trim()||null,price,stock:parseInt(document.getElementById('p-stock').value)||0,category_id:document.getElementById('p-category').value||null,images:mediaUrls,is_published:document.getElementById('p-published').classList.contains('on')};
      if(editingId){await db.from('products').update(data).eq('id',editingId);}
      else{await db.from('products').insert(data);}
      showToast(editingId?'تم التعديل':'تم إضافة المنتج');closeModal();btn.disabled=false;btn.innerHTML='<i class="fas fa-save"></i> حفظ';
      await loadProducts();
    }

    async function togglePublish(id,current){
      await db.from('products').update({is_published:!current}).eq('id',id);
      showToast(!current?'تم النشر':'تم الإخفاء');await loadProducts();
    }

    async function deleteProduct(id){
      if(!confirm('هتحذف المنتج ده؟'))return;
      await db.from('products').delete().eq('id',id);showToast('تم الحذف');await loadProducts();
    }

    function editProduct(id){openModal(id);}

    async function init(){
      const s=await adminCheck();if(!s)return;
      await loadCategories();await loadProducts();
    }
    init();
  </script>
</body>
</html>
