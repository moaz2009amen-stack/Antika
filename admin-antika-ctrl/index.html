<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Admin — لوحة التحكم</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-header">
      <span class="admin-sidebar-logo">Antika Gallery</span>
      <button class="admin-sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="admin-nav">
      <div class="nav-section-label">الرئيسية</div>
      
      <a href="/admin-antika-ctrl/" class="admin-nav-item active"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
      <div class="nav-section-label">المتجر</div>
      
      <a href="/admin-antika-ctrl/products.html" class="admin-nav-item"><i class="fas fa-box"></i> المنتجات</a>
      
      <a href="/admin-antika-ctrl/orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> الطلبات<span class="admin-nav-badge" id="pending-badge" style="display:none">0</span></a>
      <div class="nav-section-label">الإدارة</div>
      
      <a href="/admin-antika-ctrl/users.html" class="admin-nav-item"><i class="fas fa-users"></i> المستخدمين</a>
      
      <a href="/admin-antika-ctrl/settings.html" class="admin-nav-item"><i class="fas fa-cog"></i> الإعدادات</a>
      <a href="/" class="admin-nav-item" target="_blank"><i class="fas fa-external-link-alt"></i> عرض الموقع</a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="logout()" class="admin-nav-item" style="color:#dc2626;cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:right">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-right">
        <button class="admin-hamburger" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span class="admin-brand">Antika</span>
        <span class="admin-page-title">/ لوحة التحكم</span>
      </div>
      <div class="admin-topbar-left">
        <div style="display:flex;align-items:center;gap:0.5rem"><span style="font-size:0.78rem;color:var(--text-muted)">صيانة</span><div class="toggle-switch" id="maintenance-toggle" onclick="toggleMaintenance()"></div></div>
        <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>
    <div class="admin-content">
      <!-- Stats -->
      <div class="stat-cards">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-value" id="s-orders">—</div><div class="stat-label">الطلبات</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value" id="s-revenue" style="font-size:1.2rem">—</div><div class="stat-label">الإيرادات</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value" id="s-users">—</div><div class="stat-label">المستخدمين</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-value" id="s-products">—</div><div class="stat-label">المنتجات</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(220,38,38,0.1)"><i class="fas fa-clock" style="color:#dc2626"></i></div><div class="stat-value" id="s-pending" style="color:#dc2626">—</div><div class="stat-label">في الانتظار</div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(22,163,74,0.1)"><i class="fas fa-check-circle" style="color:#16a34a"></i></div><div class="stat-value" id="s-delivered" style="color:#16a34a">—</div><div class="stat-label">تم التوصيل</div></div>
      </div>
      <!-- Charts -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;margin-bottom:1.5rem" id="charts-grid">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem"><div style="font-weight:700;font-size:0.95rem;margin-bottom:1.25rem">المبيعات — آخر 7 أيام</div><canvas id="sales-chart" height="120"></canvas></div>
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem"><div style="font-weight:700;font-size:0.95rem;margin-bottom:1.25rem">حالات الطلبات</div><canvas id="status-chart" height="220"></canvas></div>
      </div>
      <!-- Recent Orders -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
        <div class="table-header"><span style="font-weight:700">آخر الطلبات</span><a href="/admin-antika-ctrl/orders.html" class="btn btn-ghost btn-sm">عرض الكل</a></div>
        <div style="overflow-x:auto">
          <table class="admin-table">
            <thead><tr><th>رقم الطلب</th><th>العميل</th><th>المبلغ</th><th>الدفع</th><th>الحالة</th><th>التاريخ</th></tr></thead>
            <tbody id="recent-tbody"><tr><td colspan="6" style="text-align:center;padding:2rem"><div class="spinner" style="margin:0 auto"></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>

    function openSidebar(){document.getElementById('admin-sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('active');}
    function closeSidebar(){document.getElementById('admin-sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('active');}
    function toggleTheme(){const t=getTheme()==='light'?'dark':'light';setTheme(t);document.getElementById('theme-toggle').innerHTML=t==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';}
    async function logout(){await db.auth.signOut();window.location.href='/admin-antika-ctrl/login.html';}
    async function adminAuth(){
      document.body.style.opacity='0';document.body.style.transition='opacity 0.25s';
      let {data:{session}}=await db.auth.getSession();
      if(!session){await new Promise(r=>setTimeout(r,900));const r=await db.auth.getSession();session=r.data.session;}
      if(!session){window.location.href='/admin-antika-ctrl/login.html';return false;}
      const role=session.user.user_metadata?.role;
      if(role!=='admin'&&role!=='moderator'){window.location.href='/admin-antika-ctrl/login.html';return false;}
      document.body.style.opacity='1';
      initTheme();
      document.getElementById('theme-toggle').innerHTML=getTheme()==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
      return true;
    }
    async function loadPendingBadge(){
      const {count}=await db.from('orders').select('*',{count:'exact',head:true}).eq('status','pending');
      const b=document.getElementById('pending-badge');
      if(b&&count>0){b.textContent=count;b.style.display='inline';}
    }

    const SB = {pending:'<span class="badge badge-warning">انتظار</span>',confirmed:'<span class="badge badge-info">مؤكد</span>',processing:'<span class="badge badge-info">تجهيز</span>',shipped:'<span class="badge badge-gold">في الطريق</span>',delivered:'<span class="badge badge-success">تم التوصيل</span>',cancelled:'<span class="badge badge-danger">ملغي</span>'};

    async function toggleMaintenance(){
      const t=document.getElementById('maintenance-toggle');const on=t.classList.contains('on');
      await db.from('settings').upsert({key:'maintenance_mode',value:(!on).toString()},{onConflict:'key'});
      t.classList.toggle('on',!on);showToast(!on?'وضع الصيانة شغال':'وضع الصيانة متوقف');
    }
    async function loadStats(){
      const [{count:to},{count:us},{count:pr},{count:pn},{count:dv},{data:od}]=await Promise.all([
        db.from('orders').select('*',{count:'exact',head:true}),
        db.from('profiles').select('*',{count:'exact',head:true}),
        db.from('products').select('*',{count:'exact',head:true}),
        db.from('orders').select('*',{count:'exact',head:true}).eq('status','pending'),
        db.from('orders').select('*',{count:'exact',head:true}).eq('status','delivered'),
        db.from('orders').select('total').eq('status','delivered')
      ]);
      const rev=od?.reduce((s,o)=>s+(o.total||0),0)||0;
      document.getElementById('s-orders').textContent=to||0;
      document.getElementById('s-revenue').textContent=formatPrice(rev);
      document.getElementById('s-users').textContent=us||0;
      document.getElementById('s-products').textContent=pr||0;
      document.getElementById('s-pending').textContent=pn||0;
      document.getElementById('s-delivered').textContent=dv||0;
      if(pn>0){const b=document.getElementById('pending-badge');if(b){b.textContent=pn;b.style.display='inline';}}
    }
    async function loadCharts(){
      const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});
      const {data:ro}=await db.from('orders').select('created_at,total').gte('created_at',days[0]);
      const spd=days.map(day=>(ro?.filter(o=>o.created_at.startsWith(day))||[]).reduce((s,o)=>s+(o.total||0),0));
      const dk=getTheme()==='dark';const gc=dk?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';const tc=dk?'#B8A888':'#8A7E6E';
      new Chart(document.getElementById('sales-chart'),{type:'line',data:{labels:days.map(d=>{const dt=new Date(d);return`${dt.getDate()}/${dt.getMonth()+1}`;}),datasets:[{data:spd,borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,0.1)',tension:0.4,fill:true,pointBackgroundColor:'#C9A84C',pointRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});
      const {data:ao}=await db.from('orders').select('status');
      const sc={pending:0,confirmed:0,processing:0,shipped:0,delivered:0,cancelled:0};
      ao?.forEach(o=>{if(sc[o.status]!==undefined)sc[o.status]++;});
      new Chart(document.getElementById('status-chart'),{type:'doughnut',data:{labels:['انتظار','مؤكد','تجهيز','في الطريق','تم التوصيل','ملغي'],datasets:[{data:Object.values(sc),backgroundColor:['#f59e0b','#3b82f6','#8b5cf6','#06b6d4','#16a34a','#dc2626'],borderWidth:2,borderColor:dk?'#1F1C16':'#FFF'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:tc,padding:8,font:{size:10}}}}}});
      document.getElementById('charts-grid').style.gridTemplateColumns=window.innerWidth<700?'1fr':'2fr 1fr';
    }
    async function loadRecentOrders(){
      const {data:orders}=await db.from('orders').select('*,profiles(full_name,phone)').order('created_at',{ascending:false}).limit(10);
      const tb=document.getElementById('recent-tbody');
      if(!orders?.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">مفيش طلبات لحد دلوقتي</td></tr>';return;}
      tb.innerHTML=orders.map(o=>`<tr style="cursor:pointer" onclick="location.href='/admin-antika-ctrl/orders.html?id=${o.id}'"><td><span style="font-family:monospace;color:var(--gold);font-weight:700">#${o.id.slice(0,8).toUpperCase()}</span></td><td><div style="font-weight:600">${o.profiles?.full_name||'—'}</div><small style="color:var(--text-muted)">${o.profiles?.phone||''}</small></td><td style="font-weight:700;color:var(--gold)">${formatPrice(o.total)}</td><td>${o.payment_method==='cash'?'<span class="badge badge-gray">كاش</span>':'<span class="badge badge-info">محفظة</span>'}</td><td>${SB[o.status]||o.status}</td><td style="color:var(--text-muted);font-size:0.8rem">${formatDate(o.created_at)}</td></tr>`).join('');
    }
    async function init(){
      const ok=await adminAuth();if(!ok)return;
      const mode=await getSetting('maintenance_mode');
      if(mode==='true')document.getElementById('maintenance-toggle').classList.add('on');
      loadStats();loadCharts();loadRecentOrders();loadPendingBadge();
    }
    init();
  </script>
</body>
</html>
