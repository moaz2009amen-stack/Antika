<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — السلة</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; padding: 2rem 0 4rem; }
    .cart-item { display: flex; gap: 1rem; padding: 1.25rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.75rem; transition: all var(--transition); }
    .cart-item:hover { border-color: var(--gold-light); }
    .cart-item-img { width: 80px; height: 100px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; background: var(--bg-secondary); }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .cart-item-price { color: var(--gold); font-weight: 700; margin-bottom: 0.75rem; }
    .cart-item-qty { display: flex; align-items: center; gap: 0; border: 1.5px solid var(--border); border-radius: var(--radius-sm); width: fit-content; overflow: hidden; }
    .qty-btn-sm { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text); transition: all var(--transition); font-size: 0.9rem; }
    .qty-btn-sm:hover { background: var(--bg-secondary); color: var(--gold); }
    .qty-num { width: 40px; height: 32px; text-align: center; border-right: 1.5px solid var(--border); border-left: 1.5px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 0.9rem; font-weight: 700; font-family: inherit; display: flex; align-items: center; justify-content: center; }
    .order-summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; position: sticky; top: 90px; height: fit-content; }
    .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0; font-size: 0.9rem; }
    .summary-total { font-size: 1.2rem; font-weight: 700; color: var(--gold); border-top: 1.5px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; }
    .empty-cart { text-align: center; padding: 5rem 2rem; }
    .empty-cart i { font-size: 4rem; color: var(--border); margin-bottom: 1.5rem; display: block; }
    @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } .order-summary { position: static; } }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar-brand">Antika Gallery</a>
    <ul class="navbar-nav" id="nav-menu">
      <li><a href="/" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
      <li><a href="/shop.html" data-ar="المتجر" data-en="Shop">المتجر</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      <button class="navbar-icon-btn" onclick="toggleLang()" style="font-size:0.75rem;font-weight:700" id="lang-toggle">EN</button>
      <a href="/cart.html" class="navbar-icon-btn" style="color:var(--gold)"><i class="fas fa-shopping-bag"></i><span class="cart-count" style="display:none">0</span></a>
      <div id="user-area"></div>
    </div>
  </nav>

  <div class="container page-enter" style="padding-top:90px;padding-bottom:4rem">
    <h1 style="font-family:var(--font-display);font-size:2rem;font-style:italic;margin-bottom:2rem" data-ar="سلة التسوق" data-en="Shopping Cart">سلة التسوق</h1>

    <div id="cart-content">
      <div class="cart-layout">
        <div id="cart-items"></div>
        <div class="order-summary">
          <h3 style="font-family:var(--font-display);font-size:1.2rem;margin-bottom:1.25rem" data-ar="ملخص الطلب" data-en="Order Summary">ملخص الطلب</h3>
          <div class="summary-row">
            <span data-ar="عدد المنتجات" data-en="Items">عدد المنتجات</span>
            <span id="summary-count">0</span>
          </div>
          <div class="summary-row">
            <span data-ar="الإجمالي الفرعي" data-en="Subtotal">الإجمالي الفرعي</span>
            <span id="summary-subtotal">0</span>
          </div>
          <div class="summary-row">
            <span data-ar="التوصيل" data-en="Delivery">التوصيل</span>
            <span style="color:#16a34a;font-weight:600" data-ar="عند الاستلام" data-en="On delivery">عند الاستلام</span>
          </div>
          <div class="summary-row summary-total">
            <span data-ar="الإجمالي" data-en="Total">الإجمالي</span>
            <span id="summary-total">0</span>
          </div>
          <a href="/checkout.html" class="btn btn-primary btn-lg btn-block" style="margin-top:1.5rem" data-ar="إتمام الطلب" data-en="Proceed to Checkout">إتمام الطلب</a>
          <a href="/shop.html" class="btn btn-ghost btn-block" style="margin-top:0.75rem" data-ar="متابعة التسوق" data-en="Continue Shopping">متابعة التسوق</a>
        </div>
      </div>
    </div>
  </div>

  <footer style="background:var(--bg-secondary);border-top:1px solid var(--border);padding:1.5rem 0">
    <div class="container footer-bottom">
      <p style="font-size:0.85rem;color:var(--text-muted)">© 2024 Antika Gallery</p>
      <p class="footer-dev">Developed by <a href="https://www.facebook.com/profile.php?id=61552026802548&locale=ar_AR" target="_blank" rel="noopener" style="color:var(--gold);font-weight:600">Moaz</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    function applyLang() {
      const l = getLang();
      document.querySelectorAll('[data-ar]').forEach(el => { if (el.tagName !== 'INPUT') el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en; });
      document.getElementById('lang-toggle').textContent = l === 'ar' ? 'EN' : 'ع';
    }
    function toggleLang() { setLang(getLang() === 'ar' ? 'en' : 'ar'); }
    function toggleTheme() { const t = getTheme() === 'light' ? 'dark' : 'light'; setTheme(t); document.getElementById('theme-toggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; }

    function renderCart() {
      const l = getLang();
      const cart = getCart();
      const itemsEl = document.getElementById('cart-items');

      if (!cart.length) {
        document.getElementById('cart-content').innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-bag"></i>
            <h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:0.75rem">${l === 'ar' ? 'السلة فاضية' : 'Your cart is empty'}</h3>
            <p style="color:var(--text-muted);margin-bottom:2rem">${l === 'ar' ? 'ابدئي التسوق وأضيفي منتجاتك المفضلة' : 'Start shopping and add your favorite products'}</p>
            <a href="/shop.html" class="btn btn-primary btn-lg">${l === 'ar' ? 'تسوقي الآن' : 'Shop Now'}</a>
          </div>`;
        return;
      }

      itemsEl.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <div class="cart-item-img">
            <img src="${item.image || 'https://via.placeholder.com/80x100?text=Antika'}" alt="${item.name}">
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${formatPrice(item.price)}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
              <div class="cart-item-qty">
                <button class="qty-btn-sm" onclick="changeQty(${i}, -1)"><i class="fas fa-minus"></i></button>
                <div class="qty-num">${item.quantity}</div>
                <button class="qty-btn-sm" onclick="changeQty(${i}, 1)"><i class="fas fa-plus"></i></button>
              </div>
              <div style="display:flex;align-items:center;gap:1rem">
                <span style="font-weight:700;color:var(--gold)">${formatPrice(item.price * item.quantity)}</span>
                <button onclick="removeItem(${i})" style="color:var(--text-muted);font-size:1rem;transition:color var(--transition)" onmouseover="this.style.color='#dc2626'" onmouseout="this.style.color='var(--text-muted)'"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          </div>
        </div>`).join('');

      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const count = cart.reduce((s, i) => s + i.quantity, 0);
      document.getElementById('summary-count').textContent = count;
      document.getElementById('summary-subtotal').textContent = formatPrice(total);
      document.getElementById('summary-total').textContent = formatPrice(total);
    }

    function changeQty(index, delta) {
      const cart = getCart();
      cart[index].quantity = Math.max(1, cart[index].quantity + delta);
      saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      const cart = getCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    async function initUserArea() {
      const user = await getCurrentUser();
      const area = document.getElementById('user-area');
      if (user) {
        const { data: profile } = await db.from('profiles').select('*').eq('id', user.id).single();
        const avatar = profile?.avatar_url ? `<img src="${profile.avatar_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">` : `<div style="width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700">${(profile?.full_name||'U')[0]}</div>`;
        area.innerHTML = `<a href="/profile.html" class="navbar-icon-btn" style="padding:0">${avatar}</a>`;
      } else {
        area.innerHTML = `<a href="/auth.html" class="btn btn-primary btn-sm">${getLang()==='ar'?'دخول':'Sign In'}</a>`;
      }
    }

    checkMaintenance(); applyLang(); updateCartCount(); initUserArea(); renderCart();
    document.getElementById('theme-toggle').innerHTML = getTheme() === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20));
  </script>
</body>
</html>
