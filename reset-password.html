<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — إعادة تعيين كلمة المرور</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/df3ffyrsg/image/upload/q_auto/f_auto/v1776645596/ChatGPT_Image_20_%D8%A3%D8%A8%D8%B1%D9%8A%D9%84_2026_02_28_38_%D8%B5_etwl3l.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      background: var(--bg-secondary);
    }
    .reset-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }
    .reset-logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-style: italic;
      color: var(--gold);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .reset-sub {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .password-toggle { position: relative; }
    .password-toggle .eye {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .password-toggle .eye:hover { color: var(--gold); }
    .password-toggle input { padding-left: 2.5rem; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 0.5rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; }
    .success-state { text-align: center; padding: 1rem 0; }
    .success-icon { font-size: 3rem; color: #16a34a; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="reset-box page-enter">
    <div class="reset-logo">Antika Gallery</div>
    <div class="reset-sub">إعادة تعيين كلمة المرور</div>

    <!-- Loading state -->
    <div id="loading-state" style="text-align:center;padding:2rem">
      <div class="spinner" style="margin:0 auto 1rem"></div>
      <p style="color:var(--text-muted);font-size:0.9rem">جاري التحقق...</p>
    </div>

    <!-- Reset form -->
    <div id="reset-form" style="display:none">
      <div class="form-group">
        <label class="form-label">كلمة المرور الجديدة</label>
        <div class="password-toggle">
          <input type="password" class="form-control" id="new-password" dir="ltr" oninput="checkStrength(this.value)" placeholder="8 أحرف على الأقل">
          <i class="fas fa-eye eye" onclick="toggleEye('new-password', this)"></i>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <small class="form-hint" id="strength-text"></small>
      </div>

      <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور</label>
        <div class="password-toggle">
          <input type="password" class="form-control" id="confirm-password" dir="ltr" placeholder="أعد كتابة كلمة المرور">
          <i class="fas fa-eye eye" onclick="toggleEye('confirm-password', this)"></i>
        </div>
      </div>

      <div class="form-error" id="reset-error" style="margin-bottom:1rem;display:none"></div>

      <button class="btn btn-primary btn-block btn-lg" onclick="handleReset()" id="reset-btn">
        <i class="fas fa-lock"></i> تعيين كلمة المرور
      </button>
    </div>

    <!-- Success state -->
    <div id="success-state" style="display:none">
      <div class="success-state">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h3 style="margin-bottom:0.5rem">تم بنجاح!</h3>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">تم تغيير كلمة المرور بنجاح</p>
        <a href="/auth.html" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </a>
      </div>
    </div>

    <!-- Error state -->
    <div id="error-state" style="display:none">
      <div class="success-state">
        <div class="success-icon" style="color:#dc2626"><i class="fas fa-times-circle"></i></div>
        <h3 style="margin-bottom:0.5rem;color:#dc2626">الرابط منتهي</h3>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem">الرابط انتهت صلاحيته أو مش صحيح. اطلب رابط جديد.</p>
        <a href="/auth.html" class="btn btn-outline btn-block">
          طلب رابط جديد
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    initTheme();

    function show(id) {
      ['loading-state','reset-form','success-state','error-state'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function toggleEye(inputId, icon) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      icon.className = inp.type === 'password' ? 'fas fa-eye eye' : 'fas fa-eye-slash eye';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#dc2626','#f59e0b','#3b82f6','#16a34a'];
      const labels = ['ضعيفة','متوسطة','جيدة','قوية'];
      fill.style.width = `${score * 25}%`;
      fill.style.background = colors[score - 1] || '#dc2626';
      text.textContent = score > 0 ? labels[score - 1] : '';
    }

    async function handleReset() {
      const newPass = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('reset-error');
      const btn = document.getElementById('reset-btn');

      if (newPass.length < 8) {
        errEl.textContent = 'كلمة المرور لازم تكون 8 أحرف على الأقل';
        errEl.style.display = 'block'; return;
      }
      if (newPass !== confirm) {
        errEl.textContent = 'كلمة المرور مش متطابقة';
        errEl.style.display = 'block'; return;
      }

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

      const { error } = await db.auth.updateUser({ password: newPass });

      if (error) {
        errEl.textContent = 'حصل خطأ — الرابط ممكن يكون انتهت صلاحيته';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock"></i> تعيين كلمة المرور';
        return;
      }

      show('success-state');
      await db.auth.signOut();
    }

    // التحقق من الـ session عند فتح الصفحة
    async function init() {
      // Supabase بيعمل handle للـ token من الـ URL تلقائياً
      const { data: { session }, error } = await db.auth.getSession();

      if (session) {
        show('reset-form');
      } else {
        // استنى شوية وجرب تاني
        await new Promise(r => setTimeout(r, 1500));
        const { data: { session: s2 } } = await db.auth.getSession();
        if (s2) {
          show('reset-form');
        } else {
          show('error-state');
        }
      }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('reset-form').style.display !== 'none') {
        handleReset();
      }
    });

    init();
  </script>
</body>
</html>
