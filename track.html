<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — تتبع الطلب</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .track-container { max-width: 680px; margin: 0 auto; padding: 2rem 0 4rem; }
    .track-search { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem; }
    .order-result { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; display: none; }
    .order-result.show { display: block; animation: fadeUp 0.3s ease; }
    .status-timeline { margin: 2rem 0; }
    .timeline-step { display: flex; gap: 1rem; padding-bottom: 1.5rem; position: relative; }
    .timeline-step:last-child { padding-bottom: 0; }
    .timeline-step:not(:last-child)::before { content: ''; position: absolute; right: 15px; top: 32px; bottom: 0; width: 2px; background: var(--border); }
    [dir="ltr"] .timeline-step:not(:last-child)::before { right: auto; left: 15px; }
    .timeline-step.done::before { background: var(--gold); }
    .step-circle { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--bg-card); font-size: 0.8rem; color: var(--text-muted); z-index: 1; }
    .timeline-step.done .step-circle { border-color: var(--gold); background: var(--gold); color: #fff; }
    .timeline-step.current .step-circle { border-color: var(--gold); color: var(--gold); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); } 50% { box-shadow: 0 0 0 6px rgba(201,168,76,0); } }
    .step-content { padding-top: 4px; }
    .step-title { font-weight: 700; font-size: 0.9rem; }
    .step-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    /* Success state */
    .success-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; text-align: center; margin-bottom: 1.5rem; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(22,163,74,.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 2rem; color: #16a34a; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar-brand">Antika Gallery</a>
    <ul class="navbar-nav">
      <li><a href="/" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
      <li><a href="/shop.html" data-ar="المتجر" data-en="Shop">المتجر</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      <button class="navbar-icon-btn" onclick="toggleLang()" style="font-size:0.75rem;font-weight:700" id="lang-toggle">EN</button>
      <a href="/wishlist.html" class="navbar-icon-btn" title="المفضلة"><i class="far fa-heart"></i></a>
      <a href="/cart.html" class="navbar-icon-btn"><i class="fas fa-shopping-bag"></i><span class="cart-count" style="display:none">0</span></a>
      <div id="user-area"></div>
    </div>
  </nav>

  <div class="container page-enter" style="padding-top:2rem">
    <div class="track-container">
      <div style="text-align:center;margin-bottom:2rem">
        <h1 style="font-family:var(--font-display);font-size:2rem;font-style:italic;margin-bottom:0.5rem" data-ar="تتبع طلبك" data-en="Track Your Order">تتبع طلبك</h1>
        <p style="color:var(--text-muted)" data-ar="ادخلي رقم التليفون عشان تشوفي طلباتك" data-en="Enter your phone number to track your orders">ادخلي رقم التليفون عشان تشوفي طلباتك</p>
      </div>

      <!-- FIX: Success state بعد إتمام الطلب من checkout.html -->
      <div id="success-box" style="display:none">
        <div class="success-box">
          <div class="success-icon"><i class="fas fa-check-circle"></i></div>
          <h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:.5rem;color:#16a34a" data-ar="تم تأكيد طلبك! 🎉" data-en="Order Confirmed! 🎉">تم تأكيد طلبك! 🎉</h3>
          <p style="color:var(--text-secondary);margin-bottom:1.25rem" data-ar="هنتواصل معاكِ قريباً على التليفون" data-en="We will contact you soon by phone">هنتواصل معاكِ قريباً على التليفون</p>
          <div id="success-order-id" style="background:var(--bg-secondary);border-radius:var(--radius-sm);padding:.6rem 1.25rem;display:inline-block;margin-bottom:1.5rem">
            <div style="font-size:.75rem;color:var(--text-muted)" data-ar="رقم الطلب" data-en="Order ID">رقم الطلب</div>
            <div id="success-id-val" style="font-family:monospace;font-weight:700;color:var(--gold);font-size:1.1rem"></div>
          </div>
          <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
            <button onclick="showTrackForm()" class="btn btn-outline btn-sm">
              <i class="fas fa-search"></i> <span data-ar="تتبع الطلب" data-en="Track Order">تتبع الطلب</span>
            </button>
            <a href="/shop.html" class="btn btn-primary btn-sm">
              <i class="fas fa-shopping-bag"></i> <span data-ar="متابعة التسوق" data-en="Continue Shopping">متابعة التسوق</span>
            </a>
          </div>
        </div>
      </div>

      <div id="track-form-wrap">
        <div class="track-search">
          <div class="form-group">
            <label class="form-label" data-ar="رقم التليفون" data-en="Phone Number">رقم التليفون</label>
            <input
              type="tel"
              class="form-control"
              id="track-phone"
              dir="ltr"
              placeholder="01xxxxxxxxx"
              maxlength="15"
              inputmode="numeric"
              autocomplete="tel"
              onkeydown="if(event.key==='Enter')trackOrder()"
              oninput="this.value=this.value.replace(/[^0-9+\-\s]/g,'')">
          </div>
          <button class="btn btn-primary btn-block" onclick="trackOrder()" id="track-btn">
            <i class="fas fa-search"></i>
            <span data-ar="تتبع الطلبات" data-en="Track Orders">تتبع الطلبات</span>
          </button>
          <div id="track-error" class="form-error" style="margin-top:0.75rem;text-align:center"></div>
        </div>
      </div>

      <div id="orders-results"></div>
    </div>
  </div>

  <footer style="background:var(--bg-secondary);border-top:1px solid var(--border);padding:1.5rem 0;margin-top:2rem">
    <div class="container footer-bottom">
      <p style="font-size:0.85rem;color:var(--text-muted)">© 2024 Antika Gallery</p>
      <p class="footer-dev">Developed by <a href="https://www.facebook.com/profile.php?id=61552026802548&locale=ar_AR" target="_blank" rel="noopener" style="color:var(--gold);font-weight:600">Moaz</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    const l = getLang();

    function applyLang() {
      document.querySelectorAll('[data-ar]').forEach(el => {
        if (el.tagName !== 'INPUT') el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en;
      });
      document.getElementById('lang-toggle').textContent = l === 'ar' ? 'EN' : 'ع';
    }
    function toggleLang()  { setLang(l === 'ar' ? 'en' : 'ar'); }
    function toggleTheme() {
      const t = getTheme() === 'light' ? 'dark' : 'light';
      setTheme(t);
      document.getElementById('theme-toggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function showTrackForm() {
      document.getElementById('success-box').style.display    = 'none';
      document.getElementById('track-form-wrap').style.display = 'block';
    }

    // FIX: validate phone
    function validatePhone(phone) {
      const cleaned = phone.replace(/[\s\-]/g, '');
      return /^[\+]?[\d]{7,15}$/.test(cleaned);
    }

    const steps = [
      { key: 'pending',    ar: 'تم استلام الطلب',  en: 'Order Received',  icon: 'fa-check' },
      { key: 'confirmed',  ar: 'تم تأكيد الطلب',   en: 'Order Confirmed', icon: 'fa-thumbs-up' },
      { key: 'processing', ar: 'جاري التجهيز',      en: 'Being Prepared',  icon: 'fa-box' },
      { key: 'shipped',    ar: 'في الطريق إليك',    en: 'On the Way',      icon: 'fa-truck' },
      { key: 'delivered',  ar: 'تم التوصيل',        en: 'Delivered',       icon: 'fa-home' }
    ];
    const statusOrder = ['pending','confirmed','processing','shipped','delivered'];

    function buildTimeline(status) {
      const currentIdx = statusOrder.indexOf(status);
      return steps.map((step, i) => {
        const isDone    = i < currentIdx || (status === 'delivered' && i <= currentIdx);
        const isCurrent = i === currentIdx && status !== 'cancelled';
        return `
          <div class="timeline-step ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}">
            <div class="step-circle"><i class="fas ${step.icon}"></i></div>
            <div class="step-content">
              <div class="step-title" style="color:${isDone || isCurrent ? 'var(--gold)' : 'var(--text-muted)'}">
                ${l === 'ar' ? step.ar : step.en}
              </div>
              ${isCurrent ? `<div class="step-date" style="color:var(--gold)">${l === 'ar' ? 'الحالة الحالية' : 'Current Status'}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function trackOrder() {
      const btn   = document.getElementById('track-btn');
      const errEl = document.getElementById('track-error');
      if (btn.disabled) return;

      const raw = document.getElementById('track-phone').value.trim();
      errEl.textContent = '';

      if (!raw) {
        errEl.textContent = l === 'ar' ? 'أدخلي رقم التليفون' : 'Please enter your phone number';
        return;
      }
      if (!validatePhone(raw)) {
        errEl.textContent = l === 'ar' ? 'رقم التليفون غير صحيح' : 'Invalid phone number';
        return;
      }

      const phone = raw.replace(/[\s\-]/g, '');
      btn.disabled  = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

      try {
        const { data: profiles, error: profileErr } = await db
          .from('profiles').select('id').eq('phone', phone);

        if (profileErr) throw profileErr;

        if (!profiles?.length) {
          errEl.textContent = l === 'ar' ? 'مفيش طلبات بالرقم ده' : 'No orders found for this number';
          return;
        }

        const userId = profiles[0].id;
        const { data: orders, error: ordersErr } = await db
          .from('orders')
          .select('*, order_items(quantity, price_at_time, products(name, name_ar, images))')
          .eq('user_id', userId)
          .order('created_at', { ascending: false });

        if (ordersErr) throw ordersErr;

        if (!orders?.length) {
          errEl.textContent = l === 'ar' ? 'مفيش طلبات بالرقم ده' : 'No orders found';
          return;
        }

        renderOrders(orders);

      } catch (err) {
        errEl.textContent = l === 'ar' ? 'حصل خطأ، حاولي تاني' : 'Something went wrong';
      } finally {
        btn.disabled  = false;
        btn.innerHTML = `<i class="fas fa-search"></i> <span>${l === 'ar' ? 'تتبع الطلبات' : 'Track Orders'}</span>`;
      }
    }

    function renderOrders(orders) {
      const statusMap = {
        pending:    { ar: 'في الانتظار', en: 'Pending',    cls: 'badge-warning' },
        confirmed:  { ar: 'مؤكد',        en: 'Confirmed',  cls: 'badge-info' },
        processing: { ar: 'قيد التجهيز', en: 'Processing', cls: 'badge-info' },
        shipped:    { ar: 'في الطريق',   en: 'Shipped',    cls: 'badge-gold' },
        delivered:  { ar: 'تم التوصيل', en: 'Delivered',  cls: 'badge-success' },
        cancelled:  { ar: 'ملغي',        en: 'Cancelled',  cls: 'badge-danger' }
      };
      const placeholder = 'https://res.cloudinary.com/df3ffyrsg/image/upload/q_auto,f_auto,w_40/v1/antika/placeholder';

      document.getElementById('orders-results').innerHTML = orders.map(order => {
        const s = statusMap[order.status] || statusMap.pending;
        return `
          <div class="order-result show" style="margin-bottom:1rem">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.5rem">
              <div>
                <div style="font-weight:700;font-family:monospace;color:var(--gold);font-size:1rem">
                  #${escapeHtml(order.id.slice(0,8).toUpperCase())}
                </div>
                <div style="font-size:0.8rem;color:var(--text-muted)">${formatDate(order.created_at)}</div>
              </div>
              <span class="badge ${s.cls}">${l === 'ar' ? s.ar : s.en}</span>
            </div>

            ${order.status !== 'cancelled'
              ? `<div class="status-timeline">${buildTimeline(order.status)}</div>`
              : `<div style="text-align:center;padding:1rem;color:#dc2626;background:rgba(220,38,38,0.05);border-radius:var(--radius);border:1px solid rgba(220,38,38,0.2)">
                  ${l === 'ar' ? 'تم إلغاء هذا الطلب' : 'This order has been cancelled'}
                </div>`}

            <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem">
              <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem">
                ${l === 'ar' ? 'المنتجات:' : 'Products:'}
              </div>
              ${(order.order_items || []).map(oi => {
                const pname = escapeHtml(l === 'ar' && oi.products?.name_ar ? oi.products.name_ar : (oi.products?.name || '—'));
                const imgSrc = escapeHtml(oi.products?.images?.[0] || placeholder);
                return `
                  <div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0">
                    <img src="${imgSrc}" style="width:40px;height:50px;border-radius:4px;object-fit:cover;background:var(--bg-secondary);border:1px solid var(--border)" onerror="this.src='${placeholder}'" alt="">
                    <div style="flex:1">
                      <div style="font-size:0.9rem;font-weight:600">${pname}</div>
                      <div style="font-size:0.8rem;color:var(--text-muted)">${l === 'ar' ? 'الكمية:' : 'Qty:'} ${escapeHtml(String(oi.quantity))}</div>
                    </div>
                    <div style="font-weight:700;color:var(--gold)">${formatPrice(oi.price_at_time * oi.quantity)}</div>
                  </div>`;
              }).join('')}
              <div style="display:flex;justify-content:space-between;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);font-weight:700">
                <span>${l === 'ar' ? 'الإجمالي' : 'Total'}</span>
                <span style="color:var(--gold)">${formatPrice(order.total)}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    async function initUserArea() {
      const user = await getCurrentUser();
      const area = document.getElementById('user-area');
      if (user) {
        area.innerHTML = `<a href="/profile.html" class="btn btn-ghost btn-sm">${l === 'ar' ? 'حسابي' : 'My Account'}</a>`;
      } else {
        area.innerHTML = `<a href="/auth.html" class="btn btn-primary btn-sm">${l === 'ar' ? 'دخول' : 'Sign In'}</a>`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────
    (function init() {
      // FIX: تحقق من success state قادم من checkout.html
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('success') === '1') {
        const orderId = urlParams.get('order');
        document.getElementById('success-box').style.display    = 'block';
        document.getElementById('track-form-wrap').style.display = 'none';
        if (orderId) {
          document.getElementById('success-id-val').textContent =
            '#' + decodeURIComponent(orderId).slice(0,8).toUpperCase();
        } else {
          document.getElementById('success-order-id').style.display = 'none';
        }
        // مسح الـ URL params بدون reload
        window.history.replaceState({}, '', '/track.html');
      }

      checkMaintenance();
      applyLang();
      updateCartCount();
      initUserArea();
      document.getElementById('theme-toggle').innerHTML = getTheme() === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20));
    })();
  </script>
</body>
</html>
