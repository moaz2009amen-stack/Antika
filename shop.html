<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — المتجر</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .shop-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; padding-top: 2rem; padding-bottom: 4rem; }
    .sidebar { position: sticky; top: 90px; height: fit-content; }
    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }
    .filter-option { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0; cursor: pointer; font-size: 0.9rem; color: var(--text-secondary); transition: color var(--transition); }
    .filter-option:hover, .filter-option.active { color: var(--gold); }
    .filter-option input[type="radio"], .filter-option input[type="checkbox"] { accent-color: var(--gold); }
    .price-range { display: flex; gap: 0.5rem; align-items: center; }
    .price-input { width: 80px; padding: 0.4rem 0.6rem; font-size: 0.85rem; }
    .shop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .results-count { font-size: 0.9rem; color: var(--text-muted); }
    .sort-select { padding: 0.5rem 1rem; font-size: 0.85rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-card); color: var(--text); font-family: inherit; cursor: pointer; outline: none; }
    .sort-select:focus { border-color: var(--gold); }
    .search-bar { position: relative; margin-bottom: 1rem; }
    .search-bar input { padding-right: 2.8rem; }
    [dir="ltr"] .search-bar input { padding-right: 1rem; padding-left: 2.8rem; }
    .search-bar i { position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); color: var(--text-muted); }
    [dir="ltr"] .search-bar i { right: auto; left: 1rem; }
    .active-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-tag { display: inline-flex; align-items: center; gap: 0.4rem; padding: 4px 12px; background: rgba(201,168,76,0.12); border: 1px solid var(--gold-light); border-radius: 20px; font-size: 0.8rem; color: var(--gold-dark); cursor: pointer; }
    .filter-tag i { font-size: 0.7rem; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; color: var(--border); margin-bottom: 1rem; display: block; }
    .mobile-filter-btn { display: none; }
    .filter-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; }
    .filter-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; background: var(--bg-card); z-index: 501; padding: 1.5rem; overflow-y: auto; transform: translateX(100%); transition: transform var(--transition); }
    [dir="ltr"] .filter-drawer { right: auto; left: 0; transform: translateX(-100%); }
    .filter-drawer.open { transform: translateX(0); }
    /* Quick View */
    .qv-overlay { position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px); }
    .qv-overlay.open { display:flex; }
    .qv-box { background:var(--bg-card);border-radius:var(--radius-lg);width:100%;max-width:820px;max-height:90vh;overflow:hidden;border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr; }
    .qv-media { background:var(--bg-secondary);overflow:hidden; }
    .qv-media img, .qv-media video { width:100%;height:100%;object-fit:cover; }
    .qv-info { padding:2rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem; }
    .qv-close { position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .2s;z-index:10; }
    .qv-close:hover { border-color:var(--gold);color:var(--gold); }
    .product-card:hover .qv-btn { opacity: 1 !important; }
    @media (max-width: 900px) {
      .shop-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-filter-btn { display: flex; }
      .filter-overlay { display: block; opacity: 0; visibility: hidden; transition: all var(--transition); }
      .filter-overlay.open { opacity: 1; visibility: visible; }
    }
    @media(max-width:600px){ .qv-box{grid-template-columns:1fr;max-height:95vh} .qv-media{height:260px;} }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="/" class="navbar-brand">Antika Gallery</a>
    <ul class="navbar-nav" id="nav-menu">
      <li><a href="/" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
      <li><a href="/shop.html" data-ar="المتجر" data-en="Shop" style="color:var(--gold)">المتجر</a></li>
      <li><a href="/track.html" data-ar="تتبع طلبك" data-en="Track Order">تتبع طلبك</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      <button class="navbar-icon-btn" onclick="toggleLang()" style="font-size:0.75rem;font-weight:700" id="lang-toggle">EN</button>
      <a href="/wishlist.html" class="navbar-icon-btn" title="المفضلة"><i class="far fa-heart"></i></a>
      <a href="/cart.html" class="navbar-icon-btn"><i class="fas fa-shopping-bag"></i><span class="cart-count" style="display:none">0</span></a>
      <div id="user-area"></div>
      <button class="hamburger" onclick="document.getElementById('nav-menu').classList.toggle('open')"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- Mobile filter -->
  <div class="filter-overlay" id="filter-overlay" onclick="closeFilterDrawer()"></div>
  <div class="filter-drawer" id="filter-drawer">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h3 style="font-size:1.1rem;font-weight:700" data-ar="الفلتر" data-en="Filter">الفلتر</h3>
      <button onclick="closeFilterDrawer()" style="color:var(--text-muted);font-size:1.2rem"><i class="fas fa-times"></i></button>
    </div>
    <div id="drawer-filters"></div>
  </div>

  <div class="container page-enter" style="padding-top:2rem;padding-bottom:4rem">
    <div style="margin-bottom:2rem">
      <h1 style="font-family:var(--font-display);font-size:2rem;font-style:italic;margin-bottom:0.25rem" data-ar="المتجر" data-en="Shop">المتجر</h1>
      <p style="color:var(--text-muted);font-size:0.9rem" data-ar="اكتشفي أحدث التريندات" data-en="Discover the latest trends">اكتشفي أحدث التريندات</p>
    </div>

    <div class="search-bar">
      <input type="text" class="form-control" id="search-input" placeholder=""
        data-placeholder-ar="ابحثي عن منتج..." data-placeholder-en="Search products..."
        maxlength="100">
      <i class="fas fa-search"></i>
    </div>

    <div class="active-filters" id="active-filters"></div>

    <div class="shop-layout">
      <aside class="sidebar">
        <div id="sidebar-content"></div>
      </aside>

      <div>
        <div class="shop-header">
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
            <span class="results-count" id="results-count"></span>
            <button class="btn btn-ghost btn-sm mobile-filter-btn" onclick="openFilterDrawer()">
              <i class="fas fa-sliders-h"></i>
              <span data-ar="فلتر" data-en="Filter">فلتر</span>
            </button>
          </div>
          <select class="sort-select" id="sort-select" onchange="goPage(1)">
            <option value="newest" data-ar="الأحدث" data-en="Newest">الأحدث</option>
            <option value="oldest" data-ar="الأقدم" data-en="Oldest">الأقدم</option>
            <option value="price_asc" data-ar="السعر: الأقل أولاً" data-en="Price: Low to High">السعر: الأقل أولاً</option>
            <option value="price_desc" data-ar="السعر: الأعلى أولاً" data-en="Price: High to Low">السعر: الأعلى أولاً</option>
          </select>
        </div>

        <div class="products-grid" id="products-grid">
          <div class="product-card skeleton" style="height:380px"></div>
          <div class="product-card skeleton" style="height:380px"></div>
          <div class="product-card skeleton" style="height:380px"></div>
          <div class="product-card skeleton" style="height:380px"></div>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <footer style="background:var(--bg-secondary);border-top:1px solid var(--border);padding:1.5rem 0;margin-top:2rem">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <p style="font-size:0.85rem;color:var(--text-muted)" data-ar="© 2024 أنتيكا جاليري" data-en="© 2024 Antika Gallery">© 2024 أنتيكا جاليري</p>
      <p class="footer-dev">Developed by <a href="https://www.facebook.com/profile.php?id=61552026802548&locale=ar_AR" target="_blank" rel="noopener" style="color:var(--gold);font-weight:600">Moaz</a></p>
    </div>
  </footer>

  <!-- Quick View Modal -->
  <div class="qv-overlay" id="qv-overlay" onclick="if(event.target===this)closeQuickView()">
    <div style="position:relative;width:100%;max-width:820px">
      <button class="qv-close" onclick="closeQuickView()"><i class="fas fa-times"></i></button>
      <div class="qv-box">
        <div class="qv-media" id="qv-media"></div>
        <div class="qv-info" id="qv-info"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────────
    const ITEMS_PER_PAGE = 12;
    let allCategories = [];
    let totalCount = 0;
    let currentPage = 1;
    let selectedCategory = '';
    let minPrice = '', maxPrice = '';
    let searchQuery = '';

    const params = new URLSearchParams(window.location.search);
    if (params.get('cat')) selectedCategory = params.get('cat');
    if (params.get('sort')) document.getElementById('sort-select').value = params.get('sort');

    // ── Lang/Theme ────────────────────────────────────────────────
    function applyLang() {
      const l = getLang();
      document.querySelectorAll('[data-ar]').forEach(el => {
        if (el.tagName === 'INPUT') return;
        if (el.tagName === 'OPTION') { el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en; return; }
        el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en;
      });
      document.getElementById('lang-toggle').textContent = l === 'ar' ? 'EN' : 'ع';
      const inp = document.getElementById('search-input');
      inp.placeholder = l === 'ar' ? inp.dataset.placeholderAr : inp.dataset.placeholderEn;
    }
    function toggleLang() { setLang(getLang() === 'ar' ? 'en' : 'ar'); }
    function toggleTheme() {
      const t = getTheme() === 'light' ? 'dark' : 'light';
      setTheme(t);
      document.getElementById('theme-toggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    // ── Sidebar ───────────────────────────────────────────────────
    function buildSidebarHTML() {
      const l = getLang();
      return `
        <div class="sidebar-section">
          <div class="sidebar-title">${l === 'ar' ? 'التصنيفات' : 'Categories'}</div>
          <label class="filter-option ${!selectedCategory ? 'active' : ''}" onclick="setCategory('')">
            <input type="radio" name="cat" ${!selectedCategory ? 'checked' : ''}> ${l === 'ar' ? 'الكل' : 'All'}
          </label>
          ${allCategories.map(c => `
            <label class="filter-option ${selectedCategory === c.slug ? 'active' : ''}" onclick="setCategory('${c.slug}')">
              <input type="radio" name="cat" ${selectedCategory === c.slug ? 'checked' : ''}>
              ${l === 'ar' && c.name_ar ? c.name_ar : c.name}
            </label>`).join('')}
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">${l === 'ar' ? 'نطاق السعر' : 'Price Range'}</div>
          <div class="price-range">
            <input type="number" class="form-control price-input" id="min-price"
              placeholder="${l === 'ar' ? 'من' : 'Min'}" value="${minPrice}" min="0" max="999999"
              oninput="minPrice=this.value;goPage(1)">
            <span style="color:var(--text-muted)">—</span>
            <input type="number" class="form-control price-input" id="max-price"
              placeholder="${l === 'ar' ? 'إلى' : 'Max'}" value="${maxPrice}" min="0" max="999999"
              oninput="maxPrice=this.value;goPage(1)">
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-block" onclick="clearFilters()" style="margin-top:0.5rem">
          <i class="fas fa-times"></i> ${l === 'ar' ? 'مسح الفلتر' : 'Clear Filters'}
        </button>`;
    }

    function renderSidebars() {
      const html = buildSidebarHTML();
      document.getElementById('sidebar-content').innerHTML = html;
      document.getElementById('drawer-filters').innerHTML = html;
    }

    function setCategory(slug) { selectedCategory = slug; currentPage = 1; renderSidebars(); loadProducts(); renderActiveFilters(); }
    function clearFilters() { selectedCategory = ''; minPrice = ''; maxPrice = ''; currentPage = 1; renderSidebars(); loadProducts(); renderActiveFilters(); }

    function renderActiveFilters() {
      const l = getLang();
      const tags = [];
      if (selectedCategory) {
        const cat = allCategories.find(c => c.slug === selectedCategory);
        if (cat) tags.push(`<span class="filter-tag" onclick="setCategory('')">${l === 'ar' && cat.name_ar ? cat.name_ar : cat.name} <i class="fas fa-times"></i></span>`);
      }
      if (minPrice) tags.push(`<span class="filter-tag" onclick="minPrice='';goPage(1);renderActiveFilters()">${l === 'ar' ? 'من' : 'From'} ${formatPrice(minPrice)} <i class="fas fa-times"></i></span>`);
      if (maxPrice) tags.push(`<span class="filter-tag" onclick="maxPrice='';goPage(1);renderActiveFilters()">${l === 'ar' ? 'إلى' : 'To'} ${formatPrice(maxPrice)} <i class="fas fa-times"></i></span>`);
      document.getElementById('active-filters').innerHTML = tags.join('');
    }

    // ── FIX: Server-side pagination — مش بنجيب كل المنتجات دفعة واحدة
    async function loadProducts() {
      const l = getLang();
      const sort = document.getElementById('sort-select').value;
      const grid = document.getElementById('products-grid');

      // Loading state
      grid.innerHTML = Array(4).fill('<div class="product-card skeleton" style="height:380px"></div>').join('');

      // Build query
      let query = db.from('products').select('*,categories(name,name_ar)', { count: 'exact' }).eq('is_published', true);

      if (searchQuery) {
        query = query.or(`name.ilike.%${searchQuery}%,name_ar.ilike.%${searchQuery}%`);
      }

      if (selectedCategory) {
        const cat = allCategories.find(c => c.slug === selectedCategory);
        if (cat) query = query.eq('category_id', cat.id);
      }

      if (minPrice) query = query.gte('price', parseFloat(minPrice));
      if (maxPrice) query = query.lte('price', parseFloat(maxPrice));

      // Sort
      if (sort === 'newest') query = query.order('created_at', { ascending: false });
      else if (sort === 'oldest') query = query.order('created_at', { ascending: true });
      else if (sort === 'price_asc') query = query.order('price', { ascending: true });
      else if (sort === 'price_desc') query = query.order('price', { ascending: false });

      // Pagination
      const from = (currentPage - 1) * ITEMS_PER_PAGE;
      const to = from + ITEMS_PER_PAGE - 1;
      query = query.range(from, to);

      const { data: products, count, error } = await query;

      if (error) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-circle"></i><p>${l === 'ar' ? 'حصل خطأ في تحميل المنتجات' : 'Error loading products'}</p></div>`;
        return;
      }

      totalCount = count || 0;
      document.getElementById('results-count').textContent = l === 'ar' ? `${totalCount} منتج` : `${totalCount} products`;

      renderProducts(products || []);
      renderPagination(Math.ceil(totalCount / ITEMS_PER_PAGE));
    }

    function getCatName(catData, l) {
      if (!catData) return '';
      return l === 'ar' && catData.name_ar ? catData.name_ar : catData.name;
    }

    function renderProducts(products) {
      const l = getLang();
      const grid = document.getElementById('products-grid');
      if (!products.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <i class="fas fa-search"></i>
          <p>${l === 'ar' ? 'مفيش منتجات بالفلتر ده' : 'No products found'}</p>
        </div>`;
        return;
      }

      const placeholder = 'https://res.cloudinary.com/df3ffyrsg/image/upload/v1/antika/placeholder';

      // FIX: HTML مكتوب صح بدون </div> زيادة
      grid.innerHTML = products.map(p => {
        const name = l === 'ar' && p.name_ar ? p.name_ar : p.name;
        const firstMedia = p.images?.[0];
        const isVid = firstMedia && isVideoUrl(firstMedia);
        const mediaSrc = firstMedia ? (isVid ? firstMedia : cardImage(firstMedia)) : placeholder;
        const isNew = new Date(p.created_at) > new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
        const catName = getCatName(p.categories, l);
        const safeName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const safeMediaSrc = isVid ? '' : mediaSrc; // مش بنحط فيديو في السلة

        const mediaEl = isVid
          ? `<video src="${mediaSrc}" muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>
             <span style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;border-radius:4px;padding:2px 8px;font-size:.7rem"><i class="fas fa-play"></i></span>`
          : `<img src="${mediaSrc}" alt="${name}" loading="lazy">`;

        return `
          <a href="/product.html?id=${p.id}" class="product-card">
            <div class="product-card-image" style="position:relative">
              ${mediaEl}
              ${isNew ? `<span class="product-card-badge">${l === 'ar' ? 'جديد' : 'New'}</span>` : ''}
              <button onclick="event.preventDefault();event.stopPropagation();openQuickView('${p.id}')"
                style="position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,0.92);border:none;border-radius:20px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;color:#1a1510;opacity:0;transition:opacity 0.2s;display:flex;align-items:center;gap:4px"
                class="qv-btn">
                <i class="fas fa-eye"></i> ${l === 'ar' ? 'عرض سريع' : 'Quick View'}
              </button>
            </div>
            <div class="product-card-body">
              <div class="product-card-title">${name}</div>
              ${catName ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">${catName}</div>` : ''}
              <div class="product-card-price">${formatPrice(p.price)}</div>
              <div class="product-card-actions">
                <button class="btn btn-primary btn-sm" style="flex:1"
                  onclick="event.preventDefault();addToCart({id:'${p.id}',name:'${safeName}',price:${p.price},image:'${safeMediaSrc}'})">
                  <i class="fas fa-shopping-bag"></i> ${l === 'ar' ? 'أضيفي للسلة' : 'Add to Cart'}
                </button>
              </div>
            </div>
          </a>`;
      }).join('');
    }

    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      let html = '';
      // Previous
      if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage - 1})"><i class="fas fa-chevron-right"></i></button>`;
      // Pages
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          html += `<span style="padding:0 0.25rem;color:var(--text-muted)">...</span>`;
        }
      }
      // Next
      if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage + 1})"><i class="fas fa-chevron-left"></i></button>`;
      el.innerHTML = html;
    }

    function goPage(p) {
      currentPage = p;
      loadProducts();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Filter drawer
    function openFilterDrawer() { document.getElementById('filter-drawer').classList.add('open'); document.getElementById('filter-overlay').classList.add('open'); }
    function closeFilterDrawer() { document.getElementById('filter-drawer').classList.remove('open'); document.getElementById('filter-overlay').classList.remove('open'); }

    // Search debounce
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', function () {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = this.value.trim();
        currentPage = 1;
        loadProducts();
      }, 400);
    });

    // ── Quick View ────────────────────────────────────────────────
    async function openQuickView(productId) {
      // FIX: بنجيب المنتج من Supabase مباشرة عشان البيانات دايماً حديثة
      const { data: product } = await db.from('products')
        .select('*,categories(name,name_ar)')
        .eq('id', productId).single();
      if (!product) return;

      const l = getLang();
      const name = l === 'ar' && product.name_ar ? product.name_ar : product.name;
      const desc = l === 'ar' && product.description_ar ? product.description_ar : product.description;
      const firstMedia = product.images?.[0];
      const isVid = firstMedia && isVideoUrl(firstMedia);
      const catName = product.categories ? (l === 'ar' && product.categories.name_ar ? product.categories.name_ar : product.categories.name) : '';
      const placeholder = 'https://res.cloudinary.com/df3ffyrsg/image/upload/v1/antika/placeholder';
      const safeImage = !isVid && firstMedia ? firstMedia : '';

      document.getElementById('qv-media').innerHTML = firstMedia
        ? isVid
          ? `<video src="${firstMedia}" controls style="width:100%;height:100%;object-fit:cover"></video>`
          : `<img src="${detailImage(firstMedia)}" alt="${name}" style="width:100%;height:100%;object-fit:cover">`
        : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)"><i class="fas fa-image" style="font-size:3rem"></i></div>`;

      const safeName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      document.getElementById('qv-info').innerHTML = `
        ${catName ? `<div style="font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold)">${catName}</div>` : ''}
        <h2 style="font-family:var(--font-display);font-size:1.5rem;line-height:1.3">${name}</h2>
        <div style="font-size:1.6rem;font-weight:700;color:var(--gold)">${formatPrice(product.price)}</div>
        ${desc ? `<p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.8">${desc}</p>` : ''}
        <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem">
          ${product.stock > 0
            ? `<i class="fas fa-check-circle" style="color:#16a34a"></i><span style="color:#16a34a;font-weight:600">${l === 'ar' ? 'متوفر' : 'In Stock'} (${product.stock})</span>`
            : `<i class="fas fa-times-circle" style="color:#dc2626"></i><span style="color:#dc2626;font-weight:600">${l === 'ar' ? 'غير متاح' : 'Out of Stock'}</span>`}
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
          <button class="btn btn-primary btn-lg" style="flex:1" ${product.stock === 0 ? 'disabled' : ''}
            onclick="addToCart({id:'${product.id}',name:'${safeName}',price:${product.price},image:'${safeImage}'})">
            <i class="fas fa-shopping-bag"></i> ${l === 'ar' ? 'أضيفي للسلة' : 'Add to Cart'}
          </button>
          <button class="btn btn-outline btn-lg" onclick="closeQuickView();window.location.href='/product.html?id=${product.id}'">
            ${l === 'ar' ? 'عرض الكامل' : 'View Full'}
          </button>
        </div>
        <a href="/product.html?id=${product.id}" style="text-align:center;font-size:0.85rem;color:var(--text-muted);text-decoration:underline">
          ${l === 'ar' ? 'التفاصيل الكاملة والتقييمات' : 'Full details & reviews'}
        </a>`;

      document.getElementById('qv-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeQuickView() {
      document.getElementById('qv-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── User Area ─────────────────────────────────────────────────
    async function initUserArea() {
      const user = await getCurrentUser();
      const area = document.getElementById('user-area');
      if (user) {
        const { data: profile } = await db.from('profiles').select('full_name,avatar_url').eq('id', user.id).single();
        const avatar = profile?.avatar_url
          ? `<img src="${avatarImage(profile.avatar_url)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">`
          : `<div style="width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700">${(profile?.full_name || 'U')[0]}</div>`;
        area.innerHTML = `<a href="/profile.html" class="navbar-icon-btn" style="padding:0">${avatar}</a>`;
      } else {
        area.innerHTML = `<a href="/auth.html" class="btn btn-primary btn-sm">${getLang() === 'ar' ? 'دخول' : 'Sign In'}</a>`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────
    async function init() {
      checkMaintenance();
      applyLang();
      updateCartCount();
      initUserArea();
      document.getElementById('theme-toggle').innerHTML = getTheme() === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

      const { data: categories } = await db.from('categories').select('*').order('name');
      allCategories = categories || [];
      renderSidebars();
      renderActiveFilters();
      loadProducts();
    }

    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20));
    init();
  </script>
</body>
</html>
