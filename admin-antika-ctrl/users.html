<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Admin — المستخدمين</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .user-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;align-items:center;gap:1rem;transition:all .2s}
    .user-card:hover{border-color:var(--gold-light);box-shadow:var(--shadow)}
    .user-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .user-avatar-placeholder{width:48px;height:48px;border-radius:50%;background:rgba(201,168,76,.15);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:var(--gold);flex-shrink:0}
    .user-info{flex:1;min-width:0}
    .user-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-email{font-size:.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-meta{font-size:.72rem;color:var(--text-muted);margin-top:.2rem}
    .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
    .stat-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
    .strip-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
    .strip-val{font-size:1.6rem;font-weight:700;font-family:var(--font-display);color:var(--gold)}
    .strip-lbl{font-size:.78rem;color:var(--text-muted);margin-top:.2rem}
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-header">
      <span class="admin-sidebar-logo">Antika Gallery</span>
      <button class="admin-sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav class="admin-nav">
      <div class="nav-section-label">الرئيسية</div>
      <a href="/admin-antika-ctrl/" class="admin-nav-item"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
      <div class="nav-section-label">المتجر</div>
      <a href="/admin-antika-ctrl/products.html" class="admin-nav-item"><i class="fas fa-box"></i> المنتجات</a>
      <a href="/admin-antika-ctrl/orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> الطلبات <span class="admin-nav-badge" id="pending-badge" style="display:none">0</span></a>
      <a href="/admin-antika-ctrl/coupons.html" class="admin-nav-item"><i class="fas fa-tag"></i> الكوبونات</a>
      <div class="nav-section-label">الإدارة</div>
      <a href="/admin-antika-ctrl/users.html" class="admin-nav-item active"><i class="fas fa-users"></i> المستخدمين</a>
      <a href="/admin-antika-ctrl/settings.html" class="admin-nav-item"><i class="fas fa-cog"></i> الإعدادات</a>
      <a href="/" class="admin-nav-item" target="_blank"><i class="fas fa-external-link-alt"></i> عرض الموقع</a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="logout()" class="admin-nav-item" style="color:#dc2626;cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:right">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-right">
        <button class="admin-hamburger" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <span class="admin-brand">Antika</span>
        <span class="admin-page-title">/ المستخدمين</span>
      </div>
      <div class="admin-topbar-left">
        <button class="navbar-icon-btn" onclick="toggleTheme()" id="theme-toggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>

    <div class="admin-content">
      <!-- Stats -->
      <div class="stat-strip">
        <div class="strip-card"><div class="strip-val" id="s-total">—</div><div class="strip-lbl">إجمالي المستخدمين</div></div>
        <div class="strip-card"><div class="strip-val" id="s-active" style="color:#16a34a">—</div><div class="strip-lbl">نشطين (لهم طلبات)</div></div>
        <div class="strip-card"><div class="strip-val" id="s-banned" style="color:#dc2626">—</div><div class="strip-lbl">محظورين</div></div>
        <div class="strip-card"><div class="strip-val" id="s-new">—</div><div class="strip-lbl">جدد (آخر 7 أيام)</div></div>
      </div>

      <!-- Search & Filter -->
      <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center">
        <div style="position:relative;flex:1;min-width:180px">
          <input type="text" class="form-control" id="q" placeholder="ابحث بالاسم أو الإيميل..." oninput="filterUsers()" style="padding-right:2.5rem">
          <i class="fas fa-search" style="position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none"></i>
        </div>
        <select class="form-control" id="f-status" onchange="filterUsers()" style="width:auto;min-width:130px">
          <option value="">الكل</option>
          <option value="active">نشط</option>
          <option value="banned">محظور</option>
        </select>
        <select class="form-control" id="f-sort" onchange="filterUsers()" style="width:auto;min-width:130px">
          <option value="new">الأحدث</option>
          <option value="orders">الأكثر طلباً</option>
          <option value="name">الاسم</option>
        </select>
      </div>

      <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:1rem" id="ucount"></div>
      <div id="users-container"><div style="text-align:center;padding:4rem"><div class="spinner" style="margin:0 auto"></div></div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    let allUsers = [];

    function openSidebar(){document.getElementById('admin-sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('active');}
    function closeSidebar(){document.getElementById('admin-sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('active');}
    function toggleTheme(){const t=getTheme()==='light'?'dark':'light';setTheme(t);document.getElementById('theme-toggle').innerHTML=t==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';}
    async function logout(){await db.auth.signOut();window.location.href='/admin-antika-ctrl/login.html';}

    async function adminAuth(){
      document.body.style.opacity='0';document.body.style.transition='opacity .25s';
      let{data:{session}}=await db.auth.getSession();
      if(!session){await new Promise(r=>setTimeout(r,900));const r=await db.auth.getSession();session=r.data.session;}
      if(!session){window.location.href='/admin-antika-ctrl/login.html';return false;}
      const role=session.user.user_metadata?.role;
      if(role!=='admin'&&role!=='moderator'){window.location.href='/admin-antika-ctrl/login.html';return false;}
      document.body.style.opacity='1';initTheme();
      document.getElementById('theme-toggle').innerHTML=getTheme()==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';
      return true;
    }

    async function loadBadge(){
      const{count}=await db.from('orders').select('*',{count:'exact',head:true}).eq('status','pending');
      const b=document.getElementById('pending-badge');if(b&&count>0){b.textContent=count;b.style.display='inline';}
    }

    async function loadUsers(){
      // نستخدم RPC function عشان نتجاوز RLS ونشوف كل اليوزرز
      const{data,error}=await db.rpc('get_all_users');

      if(error||!data){
        // fallback: نحاول نجيبهم من profiles مباشرة
        const{data:profiles}=await db.from('profiles').select('*').order('created_at',{ascending:false});
        allUsers=profiles||[];
      }else{
        allUsers=data;
      }

      // إحصائيات
      const total=allUsers.length;
      const banned=allUsers.filter(u=>u.is_banned).length;
      const week=new Date(Date.now()-7*24*60*60*1000).toISOString();
      const newUsers=allUsers.filter(u=>u.created_at>week).length;

      // عدد الطلبات لكل يوزر
      const{data:orders}=await db.from('orders').select('user_id');
      const orderMap={};
      orders?.forEach(o=>{orderMap[o.user_id]=(orderMap[o.user_id]||0)+1;});
      allUsers=allUsers.map(u=>({...u,order_count:orderMap[u.id]||0}));

      const active=allUsers.filter(u=>u.order_count>0).length;

      document.getElementById('s-total').textContent=total;
      document.getElementById('s-active').textContent=active;
      document.getElementById('s-banned').textContent=banned;
      document.getElementById('s-new').textContent=newUsers;

      filterUsers();
    }

    function filterUsers(){
      const q=document.getElementById('q').value.toLowerCase();
      const st=document.getElementById('f-status').value;
      const sort=document.getElementById('f-sort').value;

      let list=[...allUsers].filter(u=>{
        const n=((u.full_name||'')+' '+(u.email||'')).toLowerCase();
        if(q&&!n.includes(q))return false;
        if(st==='banned'&&!u.is_banned)return false;
        if(st==='active'&&u.is_banned)return false;
        return true;
      });

      list.sort((a,b)=>{
        if(sort==='orders')return(b.order_count||0)-(a.order_count||0);
        if(sort==='name')return(a.full_name||'').localeCompare(b.full_name||'');
        return new Date(b.created_at)-new Date(a.created_at);
      });

      document.getElementById('ucount').textContent=`${list.length} مستخدم`;
      render(list);
    }

    function render(list){
      const c=document.getElementById('users-container');
      if(!list.length){
        c.innerHTML=`<div style="text-align:center;padding:4rem;color:var(--text-muted)"><i class="fas fa-users" style="font-size:3rem;margin-bottom:1rem;display:block;opacity:.4"></i><p style="font-size:1rem;font-weight:600">مفيش مستخدمين</p></div>`;
        return;
      }
      c.innerHTML=`<div class="users-grid">${list.map(u=>`
        <div class="user-card" style="${u.is_banned?'opacity:.7;border-color:#dc262630':''}">
          ${u.avatar_url
            ?`<img src="${u.avatar_url}" class="user-avatar" onerror="this.style.display='none'">`
            :`<div class="user-avatar-placeholder">${(u.full_name||u.email||'?')[0].toUpperCase()}</div>`}
          <div class="user-info">
            <div class="user-name">${u.full_name||'بدون اسم'} ${u.is_banned?'<span class="badge badge-danger" style="font-size:.65rem">محظور</span>':''}</div>
            <div class="user-email">${u.email||'—'}</div>
            <div class="user-meta">
              ${u.phone?`<span><i class="fas fa-phone" style="font-size:.65rem"></i> ${u.phone}</span> · `:''}
              <span>${u.order_count} طلب</span> ·
              <span>${formatDate(u.created_at)}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:.375rem;flex-shrink:0">
            ${!u.is_banned
              ?`<button class="btn btn-danger btn-sm" onclick="banUser('${u.id}',true)" title="حظر"><i class="fas fa-ban"></i></button>`
              :`<button class="btn btn-sm" style="background:rgba(22,163,74,.1);color:#16a34a;border:none" onclick="banUser('${u.id}',false)" title="رفع الحظر"><i class="fas fa-check"></i></button>`}
            <button class="btn btn-ghost btn-sm" onclick="viewOrders('${u.id}')" title="الطلبات"><i class="fas fa-shopping-cart"></i></button>
          </div>
        </div>`).join('')}</div>`;
    }

    async function banUser(id,ban){
      const msg=ban?'هتحظر المستخدم ده؟':'هترفع الحظر عن المستخدم ده؟';
      if(!confirm(msg))return;
      await db.from('profiles').update({is_banned:ban}).eq('id',id);
      showToast(ban?'تم الحظر':'تم رفع الحظر');
      await loadUsers();
    }

    function viewOrders(userId){
      window.location.href=`/admin-antika-ctrl/orders.html?user=${userId}`;
    }

    async function init(){
      const ok=await adminAuth();if(!ok)return;
      await loadUsers();loadBadge();
    }
    init();
  </script>
</body>
</html>
