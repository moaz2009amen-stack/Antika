<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Admin — تسجيل الدخول</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; background: var(--bg-secondary); padding-top: 0 !important; }
    .login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
    .login-logo { font-family: var(--font-display); font-size: 1.8rem; font-style: italic; color: var(--gold); text-align: center; margin-bottom: 0.25rem; }
    .login-sub { text-align: center; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2rem; }
    .login-divider { height: 1px; background: var(--border); margin: 0 auto 2rem; width: 40px; }
    .password-toggle { position: relative; }
    .password-toggle .eye { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 0.9rem; }
    .password-toggle input { padding-left: 2.5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Antika</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-divider"></div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" class="form-control" id="email" dir="ltr" placeholder="admin@example.com" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <div class="password-toggle">
        <input type="password" class="form-control" id="password" dir="ltr">
        <i class="fas fa-eye eye" onclick="togglePass()"></i>
      </div>
    </div>

    <div id="error-msg" class="form-error" style="margin-bottom:1rem;text-align:center"></div>

    <button class="btn btn-primary btn-block btn-lg" onclick="handleLogin()" id="login-btn">
      <i class="fas fa-sign-in-alt"></i> دخول
    </button>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted)">
      هذه الصفحة مخصصة للإدارة فقط
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>
    // لو موجود session أدمن اروح للوحة التحكم مباشرة
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        const role = session.user.user_metadata?.role;
        if (role === 'admin' || role === 'moderator') {
          window.location.href = '/admin-antika-ctrl/';
        }
      }
    })();

    function togglePass() {
      const inp = document.getElementById('password');
      const eye = document.querySelector('.eye');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      eye.className = inp.type === 'password' ? 'fas fa-eye eye' : 'fas fa-eye-slash eye';
    }

    // Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { errEl.textContent = 'من فضلك اكتب الإيميل وكلمة المرور'; return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
      errEl.textContent = '';

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = 'إيميل أو كلمة مرور غلط';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
        return;
      }

      const role = data.user.user_metadata?.role;
      if (role !== 'admin' && role !== 'moderator') {
        await db.auth.signOut();
        errEl.textContent = 'ليس لديك صلاحية الدخول للوحة التحكم';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
        return;
      }

      window.location.href = '/admin-antika-ctrl/';
    }
  </script>
</body>
</html>
