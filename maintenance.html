<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antika Gallery — صيانة</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="maintenance-page">
    <div style="font-family:var(--font-display);font-size:3rem;font-style:italic;color:var(--gold);margin-bottom:1rem">Antika Gallery</div>
    <div style="width:80px;height:80px;border-radius:50%;background:rgba(201,168,76,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-size:2rem;color:var(--gold)">

    <p style="color:var(--text-muted);max-width:400px;line-height:1.9">هنرجع قريباً بتحديثات جديدة. شكراً لصبرك 🩷</p>
    <div style="margin-top:2rem;width:60px;height:2px;background:var(--gold);margin-left:auto;margin-right:auto"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/config.js"></script>
  <script>initTheme();</script>

</html>
